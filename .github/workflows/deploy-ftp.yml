name: Build & Deploy to FTP

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'pokemon-db.html'
      - 'rareblock-cardmarket.user.js'
      - 'rareblock-hunter-scraper.user.js'
      - 'sw.js'
      - 'memorandum.html'
      - 'memorandum-admin.html'
      - 'rareblock-dashboard.html'
      - 'rareblock-admin-users.html'
      - 'rareblock-admin-settings.html'
      - 'rareblock-verify.html'
      - 'rareblock-login.html'
      - 'business-model.html'
      - 'pagamento-ok.html'
      - 'pagamento-annullato.html'
      - 'img/**'
      - '.github/workflows/deploy-ftp.yml'
  workflow_dispatch: {}    # consente deploy manuale dall'UI di GitHub
                           # (utile per forzare un deploy senza modificare file)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Inietta le chiavi API dai GitHub Secrets nel file HTML
      # Le chiavi NON sono mai nel repo — solo nei Secrets di GitHub
      # NB: PayPal Client ID è una chiave PUBBLICA (frontend) — può stare in
      #     Secret o anche in Variables. Il Client Secret PayPal invece resta
      #     nelle Edge Functions Supabase, mai nel frontend.
      - name: Inject API keys
        run: |
          sed -i "s|ANTHROPIC_API_KEY_PLACEHOLDER|${{ secrets.ANTHROPIC_KEY }}|g" pokemon-db.html
          sed -i "s|OPENROUTER_API_KEY_PLACEHOLDER|${{ secrets.OPENROUTER_KEY }}|g" pokemon-db.html
          sed -i "s|PAYPAL_CLIENT_ID_PLACEHOLDER|${{ secrets.PAYPAL_CLIENT_ID }}|g" rareblock-dashboard.html

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}/
          local-dir: ./
          # Exclude robusto: solo i file destinati al web finiscono su Aruba.
          # Sorgenti TS edge function, docs e tooling restano nel repo ma non
          # vengono pubblicati. NB: userscript Tampermonkey *.user.js SONO
          # deployati (gli utenti li scaricano dal sito) — non escluderli.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            README.md
            HUNTER.md
            .env.example
            .deploy-ping
            supabase/**
            diagnostics/**
            extension/**
            local-lab/**
            tools/**
            **/*.ts
            **/*.md
