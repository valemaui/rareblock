name: Build & Deploy to FTP

on:
  push:
    branches: [ main ]
    paths:
      - 'pokemon-db.html'
      - 'rareblock-cardmarket.user.js'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Inietta le chiavi API dai GitHub Secrets nel file HTML
      # Le chiavi NON sono mai nel repo — solo nei Secrets di GitHub
      - name: Inject API keys
        run: |
          sed -i "s|ANTHROPIC_API_KEY_PLACEHOLDER|${{ secrets.ANTHROPIC_KEY }}|g" pokemon-db.html
          sed -i "s|OPENROUTER_API_KEY_PLACEHOLDER|${{ secrets.OPENROUTER_KEY }}|g" pokemon-db.html

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            README.md
            .env.example
            supabase/**
