name: Edge diagnostics

on:
  push:
    branches: [ main ]
    paths:
      - 'supabase/functions/smooth-endpoint/**'
      - 'tools/diag-pc.js'
      - '.github/workflows/diag.yml'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for edge deploy (120s)
        run: sleep 120

      - name: Run diag
        run: |
          mkdir -p diagnostics
          node tools/diag-pc.js 'Groudon-EX Dark Explorers' 'Groudon 106' 'Charizard Base Set' 'Charizard 4' 'Pikachu Vivid Voltage' 'Pikachu 44' 'Charizard V Brilliant Stars' 'Charizard V 154' > diagnostics/pc-latest.txt 2>&1 || true
          echo "" >> diagnostics/pc-latest.txt
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> diagnostics/pc-latest.txt
          echo "Commit:    ${{ github.sha }}" >> diagnostics/pc-latest.txt

      - name: Commit diagnostic output
        run: |
          git config user.email "action@github.com"
          git config user.name  "diag-bot"
          git add diagnostics/
          if git diff --cached --quiet; then
            echo "No changes to diagnostic output"
          else
            git commit -m "chore(diag): auto-update diagnostics [skip actions]"
            git push
          fi
