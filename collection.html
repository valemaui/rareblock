<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Collezione · RareBlock</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Montserrat:wght@200;300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Figtree:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --surface3:#2d333b;
  --border:#30363d; --border-strong:#3d444d; --border-focus:#58a6ff;
  --text:#e6edf3; --text-muted:#7d8590; --text-subtle:#484f58;
  --accent:#58a6ff; --accent-hover:#388bfd;
  --accent-soft:rgba(88,166,255,.10); --accent-softer:rgba(88,166,255,.05);
  --accent-border:rgba(88,166,255,.28);
  --gold:#c9a84c; --gold-deep:#a8862e;
  --danger:#f85149; --success:#3fb950; --warning:#d29922;
  --font:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --serif:"Fraunces","Playfair Display",Georgia,serif;
  --display:"Montserrat",system-ui,sans-serif;
  --r:6px; --r-lg:8px;
}

html,body{height:100%}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:14px;line-height:1.45;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}

a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── HEADER ───────────────────────────────────────────────────── */
.pc-shell{display:flex;flex-direction:column;min-height:100vh}
.pc-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:18px 28px 14px;flex-shrink:0;
}
.pc-header-inner{
  max-width:1400px;margin:0 auto;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
}
.pc-brand{
  display:flex;align-items:baseline;gap:14px;
  text-decoration:none;color:var(--text);
}
.pc-brand-word{
  font-family:"Montserrat",var(--display),system-ui,sans-serif;
  font-size:18px;font-weight:300;letter-spacing:.18em;
  color:var(--text);text-transform:uppercase;line-height:1;
}
.pc-brand-gold{color:var(--gold);font-weight:400}
.pc-divider{width:1px;height:30px;background:var(--border)}

.pc-title-wrap{flex:1;min-width:0}
.pc-title{
  font-family:var(--serif);font-weight:300;font-size:24px;
  color:var(--text);line-height:1.15;
}
.pc-subtitle{
  font-family:var(--mono);font-size:11px;color:var(--text-muted);
  margin-top:4px;letter-spacing:.04em;
}
.pc-share-meta{
  display:flex;gap:14px;flex-wrap:wrap;
  font-size:11px;color:var(--text-subtle);font-family:var(--mono);
  margin-top:6px;
}
.pc-share-meta-item{display:inline-flex;align-items:center;gap:4px}

/* CTA: invito a iscriversi */
.pc-cta-btn{
  background:var(--accent-soft);border:1px solid var(--accent-border);
  color:var(--accent);padding:8px 14px;border-radius:var(--r);
  font-size:12px;font-family:var(--font);font-weight:500;
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  transition:all .12s;
}
.pc-cta-btn:hover{background:var(--accent-softer);border-color:var(--accent);text-decoration:none}

/* ── STATS BAR ───────────────────────────────────────────────── */
.pc-stats{
  display:flex;border-bottom:1px solid var(--border);background:var(--surface);
  overflow-x:auto;flex-shrink:0;
}
.pc-stat-cell{
  padding:12px 22px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:2px;flex-shrink:0;
}
.pc-stat-val{font-size:18px;font-weight:600;font-family:var(--mono);color:var(--text);white-space:nowrap}
.pc-stat-val.gold{color:var(--accent)}
.pc-stat-lbl{font-size:9.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}

/* ── TOOLBAR ─────────────────────────────────────────────────── */
.pc-toolbar{
  padding:12px 28px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.pc-search{position:relative;flex:1 1 240px;max-width:340px;min-width:180px}
.pc-search input{
  width:100%;padding:7px 28px 7px 32px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-size:13px;
}
.pc-search input:focus{outline:none;border-color:var(--border-focus)}
.pc-search svg{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--text-subtle);pointer-events:none;
  stroke:currentColor;fill:none;stroke-width:2;
}
.pc-view-toggle{
  display:flex;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:2px;gap:2px;
}
.pc-view-btn{
  background:transparent;border:none;color:var(--text-muted);
  padding:5px 10px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;gap:5px;font-size:11px;
  font-family:var(--mono);transition:all .12s;
}
.pc-view-btn.active{background:var(--surface3);color:var(--accent)}
.pc-view-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.6}
.pc-sort{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:6px 10px;border-radius:var(--r);font-size:12px;cursor:pointer;
}
.pc-sort:focus{outline:none;border-color:var(--border-focus)}
.pc-toolbar-spacer{flex:1}

/* ── BODY ────────────────────────────────────────────────────── */
.pc-body{flex:1;overflow:auto;padding:0;background:var(--bg)}
.pc-content{max-width:1400px;margin:0 auto;padding:18px 28px 32px}

.pc-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;
}
.pcc{
  border:1px solid var(--border);border-radius:8px;background:var(--surface);
  overflow:hidden;display:flex;flex-direction:column;
  transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;
  position:relative;
}
.pcc:hover{
  border-color:var(--accent-border);transform:translateY(-2px);
  box-shadow:0 8px 22px rgba(0,0,0,.45);
}
.pcc-imgwrap{position:relative;background:var(--surface2);aspect-ratio:5/7;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pcc-imgwrap img{width:100%;height:100%;object-fit:contain;display:block}
.pcc-ph{font-size:30px;color:var(--text-subtle)}
.pcc-overlays{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:6px}
.pcc-row{display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
.pcc-row.bottom{align-items:flex-end}
.pcc-cond{
  background:rgba(13,17,23,.88);backdrop-filter:blur(4px);
  border:1px solid var(--border);color:var(--text);
  font-size:10px;font-weight:600;font-family:var(--mono);
  padding:2px 7px;border-radius:3px;letter-spacing:.05em;
}
.pcc-cond.c-mint,.pcc-cond.c-nm{border-color:rgba(63,185,80,.5);color:#7be08c}
.pcc-cond.c-ex{border-color:rgba(88,166,255,.5);color:#82bbff}
.pcc-cond.c-gd,.pcc-cond.c-lp{border-color:rgba(210,153,34,.5);color:#e6b94d}
.pcc-cond.c-pl,.pcc-cond.c-po,.pcc-cond.c-inkalt{border-color:rgba(248,81,73,.5);color:#ff8a82}
.pcc-qty{
  background:rgba(13,17,23,.88);backdrop-filter:blur(4px);
  border:1px solid var(--border);color:var(--text);
  font-size:10px;font-weight:600;font-family:var(--mono);
  padding:2px 7px;border-radius:3px;
}
.pcc-1st{
  background:linear-gradient(135deg,#c9a84c,#a8862e);color:#0d1117;
  font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;
  letter-spacing:.05em;font-family:var(--mono);box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.pcc-lang{
  background:rgba(13,17,23,.88);backdrop-filter:blur(4px);
  border:1px solid var(--border);color:var(--text-muted);
  font-size:9.5px;font-weight:600;font-family:var(--mono);
  padding:2px 5px;border-radius:3px;
}
.pcc-info{padding:9px 10px;display:flex;flex-direction:column;gap:3px;flex:1}
.pcc-name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcc-set{font-size:10px;color:var(--text-muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcc-meta{font-size:10px;color:var(--text-subtle);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcc-prices{display:flex;align-items:baseline;justify-content:space-between;margin-top:auto;gap:6px;padding-top:4px}
.pcc-price{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--accent);white-space:nowrap}
.pcc-cm{font-size:10px;color:var(--text-muted);font-family:var(--mono);white-space:nowrap}

/* List view */
.pc-list-wrap{overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg)}
table.pc-list{width:100%;border-collapse:collapse;font-size:12px}
.pc-list thead{background:var(--surface);position:sticky;top:0;box-shadow:inset 0 -1px 0 var(--border)}
.pc-list th{
  padding:10px 12px;text-align:left;font-size:10px;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;
  cursor:pointer;user-select:none;white-space:nowrap;
  border-bottom:1px solid var(--border);background:var(--surface);
}
.pc-list th:hover{color:var(--text)}
.pc-list th.sorted{color:var(--accent)}
.pc-list th.sorted::after{content:" ▲";font-size:9px}
.pc-list th.sorted.desc::after{content:" ▼"}
.pc-list th.num{text-align:right}
.pc-list td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.pc-list tbody tr:hover td{background:var(--surface2)}
.pc-list .pl-img{width:42px;padding:5px 8px}
.pc-list .pl-img img{width:42px;height:auto;border-radius:3px;display:block}
.pc-list .pl-img-ph{width:42px;height:58px;background:var(--surface2);border-radius:3px;display:flex;align-items:center;justify-content:center;color:var(--text-subtle)}
.pc-list .pl-name{font-weight:500;color:var(--text)}
.pc-list .pl-num{text-align:right;font-family:var(--mono)}
.pc-list .pl-mono{font-family:var(--mono);color:var(--text-muted);font-size:11px}
.pc-list .pl-price{text-align:right;font-family:var(--mono);font-weight:600;color:var(--accent)}
.pc-list .pl-cm{text-align:right;font-family:var(--mono);color:var(--text-muted);font-size:11px}
.pc-list .pl-cond{
  display:inline-block;padding:2px 7px;border-radius:3px;
  font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:.05em;
  border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);
}
.pc-list .pl-cond.c-mint,.pc-list .pl-cond.c-nm{border-color:rgba(63,185,80,.4);color:#7be08c;background:rgba(63,185,80,.08)}
.pc-list .pl-cond.c-ex{border-color:rgba(88,166,255,.4);color:#82bbff;background:rgba(88,166,255,.08)}
.pc-list .pl-cond.c-gd,.pc-list .pl-cond.c-lp{border-color:rgba(210,153,34,.4);color:#e6b94d;background:rgba(210,153,34,.08)}
.pc-list .pl-cond.c-pl,.pc-list .pl-cond.c-po,.pc-list .pl-cond.c-inkalt{border-color:rgba(248,81,73,.4);color:#ff8a82;background:rgba(248,81,73,.08)}
.pc-list .pl-1st{
  display:inline-block;background:linear-gradient(135deg,#c9a84c,#a8862e);
  color:#0d1117;font-size:8.5px;font-weight:800;padding:1px 5px;border-radius:3px;
  letter-spacing:.05em;font-family:var(--mono);margin-left:5px;vertical-align:middle;
}

/* ── EMPTY / ERROR / LOADING STATES ─────────────────────────── */
.pc-state{
  padding:80px 28px;text-align:center;display:flex;flex-direction:column;
  gap:14px;align-items:center;justify-content:center;color:var(--text-muted);
}
.pc-state-icon{font-size:48px;opacity:.4}
.pc-state-title{
  font-family:var(--serif);font-weight:300;font-size:22px;color:var(--text);
}
.pc-state-msg{font-size:13px;color:var(--text-subtle);max-width:480px;line-height:1.55}

/* ── FOOTER ─────────────────────────────────────────────────── */
.pc-footer{
  background:var(--surface);border-top:1px solid var(--border);
  padding:18px 28px;flex-shrink:0;text-align:center;
}
.pc-footer-inner{max-width:1400px;margin:0 auto}
.pc-footer-tag{
  font-family:var(--mono);font-size:10.5px;
  color:var(--text-subtle);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:8px;
}
.pc-footer-cta{
  font-family:var(--serif);font-weight:300;font-size:18px;color:var(--text);
  margin-bottom:8px;
}
.pc-footer-link{
  color:var(--accent);font-size:12.5px;font-family:var(--font);
  text-decoration:none;
}
.pc-footer-link:hover{text-decoration:underline}

@media(max-width:780px){
  .pc-header{padding:14px 16px 12px}
  .pc-header-inner{gap:10px}
  .pc-brand-word{font-size:15px;letter-spacing:.14em}
  .pc-divider{display:none}
  .pc-title{font-size:19px}
  .pc-toolbar{padding:10px 14px}
  .pc-search{flex:1 1 100%;max-width:none;order:-1}
  .pc-stats{padding:0}
  .pc-stat-cell{padding:9px 14px}
  .pc-stat-val{font-size:15px}
  .pc-content{padding:14px}
  .pc-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
  .pc-footer{padding:14px}
}

/* prestige banner: rimosso dalla vista pubblica */
.pc-subset-note{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:9px 16px;background:var(--accent-softer);
  border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text-muted);font-family:var(--mono);
}
.pc-subset-note b{color:var(--accent);font-weight:600}
.pc-subset-note .pc-subset-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:999px;
  background:var(--accent-soft);border:1px solid var(--accent-border);
  color:var(--accent);font-weight:600;
}
@media(max-width:760px){
  .pc-prest{flex-wrap:wrap;gap:12px;padding:13px 15px}
  .pc-prest-value{border-left:none;padding-left:0;text-align:left;width:100%;display:flex;align-items:baseline;gap:10px}
  .pc-prest-value-lbl{margin-top:0}
}
</style>
</head>
<body>

<div class="pc-shell">

  <!-- HEADER -->
  <header class="pc-header">
    <div class="pc-header-inner">
      <a class="pc-brand" href="https://www.rareblock.eu" target="_blank" rel="noopener">
        <span class="pc-brand-word">Rare<span class="pc-brand-gold">Block</span></span>
      </a>
      <div class="pc-divider"></div>
      <div class="pc-title-wrap">
        <div class="pc-title" id="pcTitle">Caricamento collezione…</div>
        <div class="pc-subtitle" id="pcSubtitle">Vista pubblica · sola lettura</div>
        <div class="pc-share-meta" id="pcShareMeta"></div>
      </div>
      <a class="pc-cta-btn" href="https://www.rareblock.eu" target="_blank" rel="noopener">Crea la tua collezione</a>
    </div>
  </header>

  <!-- NOTA SUB-COLLEZIONE (quando il link condivide un sottoinsieme filtrato) -->
  <div class="pc-subset-note" id="pcSubsetNote" style="display:none"></div>

  <!-- STATS -->
  <div class="pc-stats" id="pcStats" style="display:none"></div>

  <!-- TOOLBAR -->
  <div class="pc-toolbar" id="pcToolbar" style="display:none">
    <div class="pc-search">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="pcSearch" placeholder="Cerca per nome, set, numero…" autocomplete="off" oninput="pcOnSearch()"/>
    </div>
    <div class="pc-view-toggle" role="tablist" aria-label="Vista">
      <button class="pc-view-btn active" id="pcViewGridBtn" type="button" onclick="pcSetView('grid')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Griglia
      </button>
      <button class="pc-view-btn" id="pcViewListBtn" type="button" onclick="pcSetView('list')">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Elenco
      </button>
    </div>
    <select class="pc-sort" id="pcSort" onchange="pcOnSortChange()">
      <option value="created_desc">Aggiunte di recente</option>
      <option value="name_asc">Nome A→Z</option>
      <option value="name_desc">Nome Z→A</option>
      <option value="set_asc">Set A→Z</option>
      <option value="cond_best">Condizione (migliore)</option>
      <option value="sell_desc">Prezzo ↓</option>
      <option value="sell_asc">Prezzo ↑</option>
      <option value="cm_desc">CM ↓</option>
      <option value="qty_desc">Quantità ↓</option>
    </select>
    <div class="pc-toolbar-spacer"></div>
    <span style="font-size:11px;color:var(--text-subtle);font-family:var(--mono)" id="pcResultCount"></span>
  </div>

  <!-- BODY -->
  <div class="pc-body">
    <div class="pc-content">
      <div id="pcStateHost"></div>
      <div class="pc-grid"        id="pcGrid"     style="display:none"></div>
      <div class="pc-list-wrap"   id="pcListWrap" style="display:none">
        <table class="pc-list" id="pcList"><thead><tr id="pcListHead"></tr></thead><tbody id="pcListBody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="pc-footer">
    <div class="pc-footer-inner">
      <div class="pc-footer-tag">Powered by RareBlock</div>
      <div class="pc-footer-cta">Collector &amp; Investor Club</div>
      <a class="pc-footer-link" href="https://www.rareblock.eu" target="_blank" rel="noopener">www.rareblock.eu</a>
    </div>
  </footer>

</div>

<script>
// ═════════════════════════════════════════════════════════════════════
//  RareBlock — Collection Public Viewer
//  ─────────────────────────────────────────────────────────────────
//  Pagina pubblica read-only. Legge ?t=TOKEN dalla query string e
//  consuma l'RPC `get_public_collection(p_token)` su Supabase. Nessun
//  login richiesto. Solo visualizzazione: nessuna mutation possibile
//  perché l'unico endpoint esposto è una funzione SECURITY DEFINER.
// ═════════════════════════════════════════════════════════════════════
const SUPA_URL = 'https://rbjaaeyjeeqfpbzyavag.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiamFhZXlqZWVxZnBienlhdmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDUxMzUsImV4cCI6MjA4OTQyMTEzNX0.NyIKfc4cR93WrCERoT1FURWGo--vHD7Bbs3fS8OaE6E';

const COND_ORDER = {MINT:1, NM:2, EX:3, GD:4, LP:5, PL:6, PO:7, 'INK/ALT':8};

const pcState = {
  rows: [],          // array di carte (dal RPC)
  meta: null,        // { title, show_prices, show_notes, view_count, created_at }
  search: '',
  sort: 'created_desc',
  view: 'grid',
  listSortKey: '',
  listSortDir: 'desc',
  allRows: [],          // tutte le righe condivise (pre-filtro sub-collezione)
  subset: null,         // filtro sub-collezione decodificato da ?f= (o null)
  subsetActive: false,
  ownerName: ''     // nome del proprietario dalla tabella profiles
};

// ═══ COLLEZIONE 2.0 — livello collezionista + sub-collezione condivisa ═══
const PC_COND_ORDER_MAP = {MINT:1, NM:2, EX:3, GD:4, LP:5, PL:6, PO:7, 'INK/ALT':8};
const PC_TIERS = [
  { id:1, roman:'I',   name:'Iniziato',     min:0,      color:'#6e7681', glow:'rgba(110,118,129,.12)' },
  { id:2, roman:'II',  name:'Collezionista',min:1000,   color:'#b9824f', glow:'rgba(185,130,79,.14)' },
  { id:3, roman:'III', name:'Curatore',     min:5000,   color:'#c2c8d0', glow:'rgba(194,200,208,.12)' },
  { id:4, roman:'IV',  name:'Connoisseur',  min:25000,  color:'#c9a84c', glow:'rgba(201,168,76,.16)' },
  { id:5, roman:'V',   name:'Élite',        min:100000, color:'#5fd0e0', glow:'rgba(95,208,224,.15)' },
  { id:6, roman:'VI',  name:'Leggenda',     min:500000, color:'#e6c25a', glow:'rgba(230,194,90,.20)' }
];
const PC_PREST_EMBLEM = '<svg viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 12L2 9z"/><path d="M2 9h20M12 21L6 3M12 21l6-18M9 9l3-6 3 6"/></svg>';

function pcCollectionValue(cards){
  return (cards||[]).reduce(function(a,c){
    var q = parseInt(c.qty)||1;
    var cm = parseFloat(c.cm_avg30)||0;
    var sp = parseFloat(c.sell_price)||0;
    var unit = cm>0 ? cm : sp;
    return a + unit*q;
  }, 0);
}
function pcComputeLevel(value){
  var tier = PC_TIERS[0], next = null;
  for(var i=0;i<PC_TIERS.length;i++){ if(value >= PC_TIERS[i].min) tier = PC_TIERS[i]; }
  var idx = PC_TIERS.indexOf(tier);
  next = PC_TIERS[idx+1] || null;
  var progress = 1, toNext = 0;
  if(next){
    var span = next.min - tier.min;
    progress = span>0 ? Math.min(1,(value - tier.min)/span) : 1;
    toNext = Math.max(0, next.min - value);
  }
  return { tier:tier, next:next, progress:progress, toNext:toNext };
}
function pcFmtEur(n){
  n = Math.round(n);
  if(n>=1000000) return '€'+(n/1000000).toFixed(n%1000000?1:0).replace('.',',')+'M';
  if(n>=10000)   return '€'+(n/1000).toFixed(0)+'k';
  if(n>=1000)    return '€'+(n/1000).toFixed(1).replace('.',',')+'k';
  return '€'+n;
}
// Banner livello — calcolato SEMPRE su tutte le righe condivise (pcState.allRows),
// non sul sottoinsieme filtrato. Mostrato solo se i prezzi sono visibili.
function pcRenderPrestige(){
  var host = document.getElementById('pcPrest');
  if(!host) return;
  var m = pcState.meta || {};
  if(!m.show_prices){ host.style.display='none'; return; }
  var all = pcState.allRows || pcState.rows || [];
  var value = pcCollectionValue(all);
  var lvl = pcComputeLevel(value);
  var t = lvl.tier;
  host.style.setProperty('--pcprest-color', t.color);
  host.style.setProperty('--pcprest-color2', lvl.next ? lvl.next.color : t.color);
  host.style.setProperty('--pcprest-glow', t.glow);
  var progPct = Math.round(lvl.progress*100);
  var progHtml;
  if(lvl.next){
    progHtml =
      '<div class="pc-prest-progwrap">'+
        '<div class="pc-prest-progbar"><div class="pc-prest-progfill" style="width:'+progPct+'%"></div></div>'+
        '<div class="pc-prest-progtxt">'+pcFmtEur(lvl.toNext)+' al livello <b style="color:'+lvl.next.color+'">'+escapeHtml(lvl.next.name)+'</b></div>'+
      '</div>';
  } else {
    progHtml = '<div class="pc-prest-progwrap"><div class="pc-prest-progbar"><div class="pc-prest-progfill" style="width:100%"></div></div><div class="pc-prest-progtxt">Vertice della scala raggiunto</div></div>';
  }
  var cardCount = all.reduce(function(a,c){ return a+(parseInt(c.qty)||1); }, 0);
  var setCount  = new Set(all.map(function(c){return c.set_name;}).filter(Boolean)).size;
  host.innerHTML =
    '<div class="pc-prest-emblem">'+PC_PREST_EMBLEM+'</div>'+
    '<div class="pc-prest-main">'+
      '<div class="pc-prest-toprow">'+
        '<span class="pc-prest-roman">Livello '+t.roman+'</span>'+
        '<span class="pc-prest-name">'+escapeHtml(t.name)+'</span>'+
        '<span class="pc-prest-sub">· '+cardCount+' carte · '+setCount+' set</span>'+
      '</div>'+
      progHtml+
    '</div>'+
    '<div class="pc-prest-value">'+
      '<div class="pc-prest-value-num">'+pcFmtEur(value)+'</div>'+
      '<div class="pc-prest-value-lbl">Valore stimato</div>'+
    '</div>';
  host.style.display='flex';
}

// Decodifica il filtro sub-collezione passato via ?f= (base64 URL-safe → JSON).
function pcDecodeFilter(){
  try{
    var sp = new URLSearchParams(window.location.search);
    var raw = sp.get('f');
    if(!raw) return null;
    var b64 = raw.replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    var json = decodeURIComponent(escape(atob(b64)));
    var f = JSON.parse(json);
    return (f && typeof f==='object') ? f : null;
  }catch(e){ return null; }
}
// Applica un filtro sub-collezione alle righe — speculare a colApplyFilters
// dell'app. Le condizioni su prezzi/CM si attivano solo se i prezzi sono
// visibili nello share (altrimenti sarebbero NULL e filtrerebbero tutto).
function pcApplySubsetFilter(rows, f){
  if(!f) return rows;
  var pricesOn = !!(pcState.meta && pcState.meta.show_prices);
  var s = (f.search||'').toLowerCase();
  var sets = f.sets||[], langs = f.langs||[], vars = f.vars||[], conds = f.conds||[];
  var condMin = f.condMin ? PC_COND_ORDER_MAP[f.condMin] : null;
  var condMax = f.condMax ? PC_COND_ORDER_MAP[f.condMax] : null;
  var fe = f.firstEd||'', mf = f.manFilter||'';
  var pMin = (pricesOn && f.priceMin!=='' && f.priceMin!=null) ? parseFloat(f.priceMin) : null;
  var pMax = (pricesOn && f.priceMax!=='' && f.priceMax!=null) ? parseFloat(f.priceMax) : null;
  var cMin = (pricesOn && f.cmMin!=='' && f.cmMin!=null) ? parseFloat(f.cmMin) : null;
  var cMax = (pricesOn && f.cmMax!=='' && f.cmMax!=null) ? parseFloat(f.cmMax) : null;
  return rows.filter(function(c){
    if(s){
      var hay = ((c.name||'')+' '+(c.set_name||'')+' '+(c.card_number||'')+' '+(c.notes||'')).toLowerCase();
      if(hay.indexOf(s) < 0) return false;
    }
    if(sets.length  && sets.indexOf(c.set_name)<0) return false;
    if(langs.length && langs.indexOf(c.language)<0) return false;
    if(vars.length){ var v = c.variant || 'Normal'; if(vars.indexOf(v)<0) return false; }
    if((f.condMode||'single')==='single'){
      if(conds.length && conds.indexOf(c.condition)<0) return false;
    } else {
      var rank = PC_COND_ORDER_MAP[c.condition];
      if(rank == null){ if(condMin!=null || condMax!=null) return false; }
      else {
        if(condMin!=null && rank < condMin) return false;
        if(condMax!=null && rank > condMax) return false;
      }
    }
    if(fe==='yes' && !c.first_edition) return false;
    if(fe==='no'  &&  c.first_edition) return false;
    if(mf==='tcg' && c.is_manual) return false;
    if(mf==='man' && !c.is_manual) return false;
    if(pMin!=null || pMax!=null){
      var sp2 = parseFloat(c.sell_price)||0;
      if(pMin!=null && sp2 < pMin) return false;
      if(pMax!=null && sp2 > pMax) return false;
    }
    if(cMin!=null || cMax!=null){
      var cp = parseFloat(c.cm_avg30)||0;
      if(cMin!=null && cp < cMin) return false;
      if(cMax!=null && cp > cMax) return false;
    }
    return true;
  });
}
// Riepilogo leggibile dei filtri attivi (per la nota sub-collezione).
function pcDescribeFilter(f){
  if(!f) return '';
  var bits = [];
  if(f.search) bits.push('“'+f.search+'”');
  if((f.sets||[]).length)  bits.push((f.sets.length)+' set');
  if((f.langs||[]).length) bits.push(f.langs.join(', '));
  if((f.vars||[]).length)  bits.push(f.vars.join(', '));
  if((f.conds||[]).length && (f.condMode||'single')==='single') bits.push(f.conds.join('/'));
  if((f.condMode==='range') && (f.condMin||f.condMax)) bits.push('cond. '+(f.condMin||'…')+'–'+(f.condMax||'…'));
  if(f.firstEd==='yes') bits.push('1ª ed.');
  if(f.firstEd==='no')  bits.push('no 1ª ed.');
  if(f.manFilter==='tcg') bits.push('solo TCG');
  if(f.manFilter==='man') bits.push('solo manuali');
  if(f.priceMin||f.priceMax) bits.push('prezzo '+(f.priceMin||'0')+'–'+(f.priceMax||'∞')+'€');
  if(f.cmMin||f.cmMax) bits.push('CM '+(f.cmMin||'0')+'–'+(f.cmMax||'∞')+'€');
  return bits.join(' · ');
}


function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function setState(html){
  document.getElementById('pcStateHost').innerHTML = html;
  document.getElementById('pcStats').style.display    = 'none';
  document.getElementById('pcToolbar').style.display  = 'none';
  document.getElementById('pcGrid').style.display     = 'none';
  document.getElementById('pcListWrap').style.display = 'none';
}

function getTokenFromURL(){
  const sp = new URLSearchParams(window.location.search);
  return (sp.get('t') || sp.get('token') || '').trim();
}

async function pcLoad(){
  const token = getTokenFromURL();
  if(!token){
    setState(
      '<div class="pc-state">' +
        '<div class="pc-state-icon">🔒</div>' +
        '<div class="pc-state-title">Link non valido</div>' +
        '<div class="pc-state-msg">Manca il parametro di condivisione. Richiedi al proprietario un link nuovo nel formato <code>collection.html?t=…</code>.</div>' +
        '<a class="pc-cta-btn" href="https://www.rareblock.eu">Vai a RareBlock</a>' +
      '</div>'
    );
    document.getElementById('pcTitle').textContent    = 'Link non valido';
    document.getElementById('pcSubtitle').textContent = '';
    return;
  }
  setState(
    '<div class="pc-state">' +
      '<div class="pc-state-icon">⌛</div>' +
      '<div class="pc-state-title" style="font-size:16px">Carico la collezione…</div>' +
    '</div>'
  );
  try{
    const r = await fetch(SUPA_URL + '/rest/v1/rpc/get_public_collection', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPA_KEY,
        'Authorization':'Bearer '+SUPA_KEY,
        'Prefer':'return=representation'
      },
      body: JSON.stringify({ p_token: token })
    });
    if(!r.ok){
      const txt = await r.text();
      throw new Error('HTTP '+r.status+': '+txt);
    }
    const rows = await r.json();
    if(!Array.isArray(rows) || rows.length===0){
      // Token non valido / scaduto / collezione vuota
      // Distinguiamo: la RPC ritorna 0 righe sia se il token è invalido,
      // sia se il proprietario non ha carte. Mostriamo un messaggio neutro.
      setState(
        '<div class="pc-state">' +
          '<div class="pc-state-icon">📭</div>' +
          '<div class="pc-state-title">Collezione non disponibile</div>' +
          '<div class="pc-state-msg">Il link potrebbe essere scaduto, disattivato o la collezione potrebbe essere vuota. Richiedi al proprietario un link aggiornato.</div>' +
          '<a class="pc-cta-btn" href="https://www.rareblock.eu">Crea la tua collezione</a>' +
        '</div>'
      );
      document.getElementById('pcTitle').textContent    = 'Collezione non disponibile';
      document.getElementById('pcSubtitle').textContent = '';
      return;
    }
    // Estrai i metadati dello share dalla prima riga (sono identici su tutte le righe)
    pcState.meta = {
      title:        rows[0].share_title,
      show_prices:  rows[0].share_show_prices,
      show_notes:   rows[0].share_show_notes,
      view_count:   rows[0].share_view_count,
      created_at:   rows[0].share_created_at
    };
    // Sub-collezione: se il link contiene ?f=, applica il filtro al sottoinsieme.
    // pcState.allRows resta l'insieme completo (per livello + conteggi globali).
    pcState.allRows = rows;
    pcState.ownerName = (rows[0] && rows[0].owner_full_name) || '';
    var subF = pcDecodeFilter();
    if(subF){
      var sub = pcApplySubsetFilter(rows, subF);
      pcState.subset = subF;
      pcState.subsetActive = true;
      pcState.rows = sub;
    } else {
      pcState.subset = null;
      pcState.subsetActive = false;
      pcState.rows = rows;
    }
    pcRenderHeader();
    // Best-effort: incrementa il view counter (non blocchiamo il render se fallisce)
    fetch(SUPA_URL + '/rest/v1/rpc/incr_collection_share_view', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY },
      body: JSON.stringify({ p_token: token })
    }).catch(function(){});
    document.getElementById('pcStats').style.display   = 'flex';
    document.getElementById('pcToolbar').style.display = 'flex';
    pcRender();
  } catch(e){
    setState(
      '<div class="pc-state">' +
        '<div class="pc-state-icon">⚠️</div>' +
        '<div class="pc-state-title">Errore di caricamento</div>' +
        '<div class="pc-state-msg" style="color:var(--danger)">' + escapeHtml(e.message||'sconosciuto') + '</div>' +
        '<a class="pc-cta-btn" href="https://www.rareblock.eu">Vai a RareBlock</a>' +
      '</div>'
    );
    document.getElementById('pcTitle').textContent    = 'Errore di caricamento';
    document.getElementById('pcSubtitle').textContent = '';
  }
}

function pcRenderHeader(){
  const m = pcState.meta || {};
  const total = pcState.rows.length;
  const totQty = pcState.rows.reduce(function(a,c){ return a + (parseInt(c.qty)||1); }, 0);
  document.getElementById('pcTitle').textContent =
    m.title || 'Collezione condivisa';
  // Subtitle: "X carte · Y voci · condivisa il D mese Y"
  const dt = m.created_at ? new Date(m.created_at) : null;
  const dtLbl = dt ? dt.toLocaleDateString('it-IT', {day:'numeric',month:'long',year:'numeric'}) : '';
  document.getElementById('pcSubtitle').textContent =
    pcState.ownerName ? 'Collezione di ' + pcState.ownerName : 'Collezione condivisa';
  // Stats bar
  const sets = new Set(pcState.rows.map(function(c){return c.set_name;}).filter(Boolean)).size;
  const fed  = pcState.rows.filter(function(c){return c.first_edition;}).length;
  let html = '' +
    '<div class="pc-stat-cell"><div class="pc-stat-val">'+totQty+'</div><div class="pc-stat-lbl">Carte totali</div></div>' +
    '<div class="pc-stat-cell"><div class="pc-stat-val">'+total+'</div><div class="pc-stat-lbl">Voci uniche</div></div>' +
    '<div class="pc-stat-cell"><div class="pc-stat-val">'+sets+'</div><div class="pc-stat-lbl">Set diversi</div></div>' +
    '<div class="pc-stat-cell"><div class="pc-stat-val">'+fed+'</div><div class="pc-stat-lbl">1ª edizione</div></div>';
  if(m.show_prices){
    // Valore stimato: cm_avg30 (mercato) preferito, fallback sell_price (manuale)
    var _src = pcState.allRows.length ? pcState.allRows : pcState.rows;
    var bestVal = 0, unpriced = 0;
    _src.forEach(function(card){
      var q = parseInt(card.qty)||1;
      var cm = parseFloat(card.cm_avg30)||0;
      var sp = parseFloat(card.sell_price)||0;
      if(cm > 0)      { bestVal += cm * q; }
      else if(sp > 0) { bestVal += sp * q; }
      else            { unpriced++; }
    });
    var fmtV = function(n){ n=Math.round(n); if(n>=1000000) return '€'+(n/1000000).toFixed(1).replace('.',',')+'M'; if(n>=10000) return '€'+(n/1000).toFixed(0)+'k'; if(n>=1000) return '€'+(n/1000).toFixed(1).replace('.',',')+'k'; return '€'+n; };
    var unp = unpriced ? ' <span style="font-size:9.5px;color:var(--text-subtle)">'+unpriced+' senza prezzo</span>' : '';
    html += '<div class="pc-stat-cell"><div class="pc-stat-val gold">'+fmtV(bestVal)+'</div><div class="pc-stat-lbl">Valore stimato'+unp+'</div></div>';
  }
  document.getElementById('pcStats').innerHTML = html;
  // Meta sotto al titolo
  const metaItems = [];
  if(dtLbl) metaItems.push('Condivisa il ' + dtLbl);
  if(m.view_count!=null) metaItems.push((m.view_count|0) + ' visite');
  document.getElementById('pcShareMeta').innerHTML = metaItems
    .map(function(x){ return '<span class="pc-share-meta-item">'+escapeHtml(x)+'</span>'; })
    .join('');
  // Nota sub-collezione (se il link condivide un sottoinsieme filtrato)
  var note = document.getElementById('pcSubsetNote');
  if(note){
    if(pcState.subsetActive){
      var desc = pcDescribeFilter(pcState.subset);
      note.innerHTML =
        '<span class="pc-subset-pill">◑ Sub-collezione</span>'+
        '<span>Questo link mostra un sottoinsieme filtrato: <b>'+pcState.rows.length+'</b> di '+pcState.allRows.length+' voci'+
        (desc ? ' — '+escapeHtml(desc) : '')+'</span>';
      note.style.display='flex';
    } else {
      note.style.display='none';
    }
  }
}

function pcOnSearch(){
  pcState.search = (document.getElementById('pcSearch').value||'').toLowerCase();
  pcRender();
}
function pcOnSortChange(){
  pcState.sort = document.getElementById('pcSort').value;
  pcState.listSortKey = '';
  pcRender();
}
function pcSetView(v){
  pcState.view = v;
  document.getElementById('pcViewGridBtn').classList.toggle('active', v==='grid');
  document.getElementById('pcViewListBtn').classList.toggle('active', v==='list');
  pcRender();
}
function pcListSort(key){
  if(pcState.listSortKey===key){
    pcState.listSortDir = pcState.listSortDir==='asc'?'desc':'asc';
  } else {
    pcState.listSortKey = key;
    pcState.listSortDir = (key==='name'||key==='set'||key==='cond')?'asc':'desc';
  }
  pcRender();
}

function pcApplyFilters(rows){
  const s = pcState.search;
  if(!s) return rows;
  return rows.filter(function(c){
    const hay = ((c.name||'')+' '+(c.set_name||'')+' '+(c.card_number||'')).toLowerCase();
    return hay.indexOf(s) >= 0;
  });
}
function pcApplySort(rows){
  const arr = rows.slice();
  let key = pcState.sort;
  if(pcState.view==='list' && pcState.listSortKey){
    key = pcState.listSortKey + '_' + pcState.listSortDir;
  }
  const cmpStr  = function(a,b){ return (a||'').localeCompare(b||'',undefined,{numeric:true,sensitivity:'base'}); };
  const cmpNum  = function(a,b){ return (parseFloat(a)||0) - (parseFloat(b)||0); };
  const cmpDate = function(a,b){ return new Date(a||0).getTime() - new Date(b||0).getTime(); };
  const cmpCond = function(a,b){ return (COND_ORDER[a]||99) - (COND_ORDER[b]||99); };
  switch(key){
    case 'created_asc':  arr.sort(function(a,b){return cmpDate(a.created_at,b.created_at);}); break;
    case 'created_desc': arr.sort(function(a,b){return cmpDate(b.created_at,a.created_at);}); break;
    case 'name_asc':     arr.sort(function(a,b){return cmpStr(a.name,b.name);}); break;
    case 'name_desc':    arr.sort(function(a,b){return cmpStr(b.name,a.name);}); break;
    case 'set_asc':      arr.sort(function(a,b){return cmpStr(a.set_name,b.set_name) || cmpStr(a.card_number,b.card_number);}); break;
    case 'set_desc':     arr.sort(function(a,b){return cmpStr(b.set_name,a.set_name);}); break;
    case 'cond_best':    arr.sort(function(a,b){return cmpCond(a.condition,b.condition);}); break;
    case 'cond_worst':   arr.sort(function(a,b){return cmpCond(b.condition,a.condition);}); break;
    case 'sell_desc':    arr.sort(function(a,b){return cmpNum(b.sell_price,a.sell_price);}); break;
    case 'sell_asc':     arr.sort(function(a,b){return cmpNum(a.sell_price,b.sell_price);}); break;
    case 'cm_desc':      arr.sort(function(a,b){return cmpNum(b.cm_avg30,a.cm_avg30);}); break;
    case 'cm_asc':       arr.sort(function(a,b){return cmpNum(a.cm_avg30,b.cm_avg30);}); break;
    case 'qty_desc':     arr.sort(function(a,b){return cmpNum(b.qty,a.qty);}); break;
  }
  return arr;
}

function pcRender(){
  const filtered = pcApplyFilters(pcState.rows);
  const sorted   = pcApplySort(filtered);
  const showPrices = !!(pcState.meta && pcState.meta.show_prices);
  document.getElementById('pcResultCount').textContent =
    sorted.length + (sorted.length === pcState.rows.length ? ' carte' : ' di ' + pcState.rows.length);
  document.getElementById('pcStateHost').innerHTML = '';
  if(pcState.view==='grid'){
    document.getElementById('pcListWrap').style.display = 'none';
    document.getElementById('pcGrid').style.display     = 'grid';
    pcRenderGrid(sorted, showPrices);
  } else {
    document.getElementById('pcGrid').style.display     = 'none';
    document.getElementById('pcListWrap').style.display = 'block';
    pcRenderList(sorted, showPrices);
  }
}

function pcRenderGrid(cards, showPrices){
  const host = document.getElementById('pcGrid');
  if(!cards.length){
    host.innerHTML = '';
    document.getElementById('pcStateHost').innerHTML =
      '<div class="pc-state">' +
        '<div class="pc-state-icon">🔍</div>' +
        '<div class="pc-state-title" style="font-size:18px">Nessun risultato</div>' +
        '<div class="pc-state-msg">Prova a cambiare i termini di ricerca.</div>' +
      '</div>';
    return;
  }
  host.innerHTML = cards.map(function(c){
    const cond = c.condition || '?';
    const cls  = 'c-' + cond.toLowerCase().replace('/','');
    const img  = (c.image_url && String(c.image_url).indexOf('http')===0)
      ? '<img src="'+escapeHtml(c.image_url)+'" loading="lazy" alt=""/>'
      : '<div class="pcc-ph">🃏</div>';
    const sp = parseFloat(c.sell_price)||0;
    const cm = parseFloat(c.cm_avg30)||0;
    const setLine = (c.set_name||'—') + (c.card_number?(' · #'+c.card_number):'');
    const variant = c.variant || 'Normal';
    const lang = c.language || '—';
    const qty  = '×'+(parseInt(c.qty)||1);
    return '<div class="pcc">' +
      '<div class="pcc-imgwrap">' + img +
        '<div class="pcc-overlays">' +
          '<div class="pcc-row">' +
            '<span class="pcc-cond '+cls+'">'+escapeHtml(cond)+'</span>' +
            (c.first_edition ? '<span class="pcc-1st">1ª ED.</span>' : '') +
          '</div>' +
          '<div class="pcc-row bottom">' +
            '<span class="pcc-lang">'+escapeHtml(lang)+'</span>' +
            '<span class="pcc-qty">'+qty+'</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="pcc-info">' +
        '<div class="pcc-name" title="'+escapeHtml(c.name||'')+'">'+escapeHtml(c.name||'(senza nome)')+'</div>' +
        '<div class="pcc-set">'+escapeHtml(setLine)+'</div>' +
        '<div class="pcc-meta">'+escapeHtml(variant)+'</div>' +
        (showPrices
          ? ('<div class="pcc-prices">' +
              (sp>0 ? '<span class="pcc-price">€'+sp.toFixed(2)+'</span>' : '<span class="pcc-price" style="color:var(--text-subtle);font-weight:400">— €</span>') +
              (cm>0 ? '<span class="pcc-cm">CM '+cm.toFixed(2)+'</span>' : '') +
            '</div>')
          : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function pcRenderList(cards, showPrices){
  const head = document.getElementById('pcListHead');
  const body = document.getElementById('pcListBody');
  const sk = pcState.listSortKey;
  const sd = pcState.listSortDir;
  function th(label, key, extra){
    const cls = (sk===key) ? ('sorted '+(sd==='desc'?'desc':'')) : '';
    return '<th class="'+(extra||'')+' '+cls+'" onclick="pcListSort(\''+key+'\')">'+label+'</th>';
  }
  let cols = '<th class="pl-img"></th>' +
    th('Nome','name') +
    th('Set','set') +
    th('# Num','number','num') +
    th('Variante','variant') +
    th('Cond','condition') +
    th('Lingua','language') +
    th('Q.tà','qty','num');
  if(showPrices){
    cols += th('CM','cm_avg30','num') + th('Prezzo','sell_price','num');
  }
  head.innerHTML = cols;
  if(!cards.length){
    body.innerHTML = '<tr><td colspan="' + (showPrices?10:8) + '" style="padding:0">' +
      '<div class="pc-state"><div class="pc-state-icon">🔍</div><div class="pc-state-title" style="font-size:18px">Nessun risultato</div></div>' +
      '</td></tr>';
    return;
  }
  body.innerHTML = cards.map(function(c){
    const cond = c.condition || '?';
    const cls  = 'c-' + cond.toLowerCase().replace('/','');
    const img  = (c.image_url && String(c.image_url).indexOf('http')===0)
      ? '<img src="'+escapeHtml(c.image_url)+'" loading="lazy" alt=""/>'
      : '<div class="pl-img-ph">🃏</div>';
    const sp = parseFloat(c.sell_price)||0;
    const cm = parseFloat(c.cm_avg30)||0;
    return '<tr>' +
      '<td class="pl-img">'+img+'</td>' +
      '<td><div class="pl-name">'+escapeHtml(c.name||'(senza nome)')+
        (c.first_edition?'<span class="pl-1st">1ª</span>':'')+
      '</div></td>' +
      '<td><span class="pl-mono">'+escapeHtml(c.set_name||'—')+'</span></td>' +
      '<td class="pl-num">'+escapeHtml(c.card_number||'—')+'</td>' +
      '<td><span class="pl-mono">'+escapeHtml(c.variant||'Normal')+'</span></td>' +
      '<td><span class="pl-cond '+cls+'">'+escapeHtml(cond)+'</span></td>' +
      '<td><span class="pl-mono">'+escapeHtml(c.language||'—')+'</span></td>' +
      '<td class="pl-num">'+(parseInt(c.qty)||1)+'</td>' +
      (showPrices
        ? ('<td class="pl-cm">'+(cm>0?('€'+cm.toFixed(2)):'—')+'</td>' +
           '<td class="pl-price">'+(sp>0?('€'+sp.toFixed(2)):'<span style="color:var(--text-subtle);font-weight:400">—</span>')+'</td>')
        : '') +
    '</tr>';
  }).join('');
}

// Avvio
pcLoad();
</script>
