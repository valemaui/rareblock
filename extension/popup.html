<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>RareBlock Hunter</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;width:340px;background:#0d1117;color:#c9d1d9;padding:14px;font-size:13px}
    h1{font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .badge{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(56,139,253,.2);color:#58a6ff;font-weight:600;letter-spacing:.04em}
    .status{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:10px;padding:8px 10px;background:#161b22;border:1px solid #30363d;border-radius:6px}
    .dot{width:8px;height:8px;border-radius:50%;background:#3fb950;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.4}}
    .caps{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
    .cap{font-size:9px;padding:2px 6px;border-radius:3px;background:#21262d;color:#8b949e;font-family:monospace;text-transform:uppercase;letter-spacing:.5px}
    h2{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}
    .runs{max-height:240px;overflow-y:auto;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:6px}
    .run{padding:6px 8px;border-radius:4px;font-size:11px;margin-bottom:3px;background:#0d1117;display:flex;justify-content:space-between;align-items:center;gap:6px}
    .run.err{border-left:2px solid #f85149}
    .run.ok{border-left:2px solid #3fb950}
    .run-info{flex:1;min-width:0}
    .run-site{font-weight:600;text-transform:capitalize}
    .run-time{font-size:9px;color:#6e7681;font-family:monospace;margin-top:2px}
    .run-count{font-size:11px;font-weight:700;color:#3fb950;font-family:monospace;flex-shrink:0}
    .run.err .run-count{color:#f85149;font-weight:500;font-size:9px}
    .empty{font-size:11px;color:#6e7681;text-align:center;padding:20px;font-style:italic}
    .footer{margin-top:12px;padding-top:10px;border-top:1px solid #30363d;font-size:10px;color:#6e7681;text-align:center}
    .footer a{color:#58a6ff;text-decoration:none}
    button.clear{margin-top:8px;width:100%;padding:6px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;cursor:pointer;font-size:11px}
    button.clear:hover{background:#30363d}
  </style>
</head>
<body>
  <h1>🎯 RareBlock Hunter <span class="badge" id="version">v?</span></h1>

  <div class="status">
    <div class="dot"></div>
    <div>
      <div><b>Attivo</b> — pronto a scrappare</div>
      <div class="caps" id="caps"></div>
    </div>
  </div>

  <h2>Esecuzioni recenti</h2>
  <div class="runs" id="runs">
    <div class="empty">Nessuna esecuzione ancora.</div>
  </div>
  <button class="clear" id="clearBtn">Pulisci storico</button>

  <div class="footer">
    Bridge tra <a href="https://www.rareblock.eu" target="_blank">RareBlock</a> e Catawiki/eBay/Subito.<br>
    Apre tab nascoste, scappe, chiude.
  </div>

  <script src="popup.js"></script>
</body>
</html>
