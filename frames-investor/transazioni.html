<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transazioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/rareblock-shared.css"/>
<style>
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column}

/* TX styles (estratto 1:1 da rareblock-dashboard.html L4032-4042) */
/* ═══ TRANSACTIONS ═══ */
.tx-wrap{flex:1;overflow-y:auto;padding:18px 20px}
.tx-toolbar{padding:14px 18px;border:1px solid var(--border);border-radius:var(--r);display:flex;gap:18px;align-items:flex-end;background:var(--surface);margin-bottom:14px}
.tx-filter-group{display:flex;flex-direction:column;gap:5px}
.tx-filter-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;font-family:var(--mono)}
.tx-filter-group select{min-width:160px;padding:6px 10px}
.tx-table{width:100%;border-collapse:collapse;font-size:13px}
.tx-table th{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);padding:8px 16px;border-bottom:1px solid var(--border);text-align:left;background:var(--surface);position:sticky;top:0;z-index:1}
.tx-table td{padding:10px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.tx-table tr:hover td{background:rgba(255,255,255,.025)}



.tx-wrap{flex:1;overflow:auto;padding:20px 24px}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-state .icon{font-size:32px;margin-bottom:10px;opacity:.6}
.empty-state h3{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text)}
.empty-state p{font-size:12px}
</style>
</head>
<body>

<div class="tab" id="tab-tx" style="display:flex;flex-direction:column;flex:1">
  <div class="tx-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:0 4px">
      <div>
        <div style="font-size:15px;font-weight:600;letter-spacing:.005em;display:inline-flex;align-items:center;gap:8px"><span class="rb-i rb-i-list" style="color:var(--accent)"></span> Transazioni</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:3px">Storico completo dei tuoi acquisti, accrual costi, liquidazioni e operazioni sul mercato secondario.</div>
      </div>
      <button class="btn sm" onclick="txLoad()" title="Aggiorna"><span class="rb-i rb-i-refresh"></span> Aggiorna</button>
    </div>
    <div class="tx-toolbar">
      <div class="tx-filter-group">
        <label for="txFilter" class="tx-filter-lbl">Tipo</label>
        <select id="txFilter" onchange="txLoad()">
          <option value="">Tutti</option>
          <option value="purchase">Acquisti</option>
          <option value="accrual">Accrual costi</option>
          <option value="liquidation">Liquidazioni</option>
          <option value="secondary_buy">Secondario</option>
        </select>
      </div>
      <div class="tx-filter-group">
        <label for="txStatus" class="tx-filter-lbl">Stato</label>
        <select id="txStatus" onchange="txLoad()">
          <option value="">Tutti</option>
          <option value="pending">In attesa</option>
          <option value="confirmed">Confermati</option>
          <option value="rejected">Rifiutati</option>
        </select>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="tx-table" id="txTable">
        <thead><tr>
          <th>Data</th><th>Prodotto</th><th>Tipo</th><th>Quote</th>
          <th>Importo</th><th>Metodo</th><th>Stato</th><th>Note</th>
        </tr></thead>
        <tbody id="txTbody"></tbody>
      </table>
    </div>
    <div class="empty-state" id="txEmpty" style="display:none">
      <div class="icon"><span class="rb-i rb-i-list"></span></div><h3>Nessuna transazione</h3><p>Le tue operazioni appariranno qui.</p>
    </div>
  </div>
</div>

<script src="../shared/rareblock-shared.js" defer></script>
<script defer>
(function(){
  function p(name){
    try { return (window.parent && window.parent !== window) ? window.parent[name] : undefined; }
    catch(_){ return undefined; }
  }
  // Bridge solo per le utilities specifiche del rareblock-dashboard.html
  // (NON per supa/esc/SUPA_URL/SUPA_KEY: quelli arrivano da shared/rareblock-shared.js
  // che gira nel frame stesso e usa la sessione localStorage same-origin condivisa).
  ['fmtDate','fmt2','fmtMoney','payBadge','skelRows','uiErrorCell','typeBadge','daysTo','uiLoading','uiError'].forEach(function(name){
    if(typeof window[name] === 'undefined'){
      Object.defineProperty(window, name, {
        configurable: true,
        get: function(){ return p(name); }
      });
    }
  });
  // State condiviso del parent: _session (auth Investor), _mktProducts (lista prodotti)
  Object.defineProperty(window, '_session', {
    configurable: true,
    get: function(){ return p('_session') || null; }
  });
  Object.defineProperty(window, '_mktProducts', {
    configurable: true,
    get: function(){ return p('_mktProducts') || []; }
  });
})();

async function txLoad(){
  if(!_session) return;
  var uid  = _session.user && _session.user.id;
  if(!uid) return;
  var type = document.getElementById('txFilter').value;
  var stat = document.getElementById('txStatus').value;
  // Mostra skeleton durante il fetch (UX più fluida del "tabella vuota poi popolata")
  var tbody0 = document.getElementById('txTbody');
  if(tbody0) tbody0.innerHTML = skelRows(5, ['short','long','medium','short','medium','tag','tag','medium']);
  var empty0 = document.getElementById('txEmpty');
  if(empty0) empty0.style.display='none';
  var qs   = 'inv_payments?user_id=eq.'+uid+'&order=created_at.desc'
    +(type?'&type=eq.'+type:'')
    +(stat?'&status=eq.'+stat:'');
  try {
    var rows = (await supa('GET',qs)) || [];
    var empty = document.getElementById('txEmpty');
    var tbody = document.getElementById('txTbody');
    if(!rows.length){ empty.style.display=''; tbody.innerHTML=''; return; }
    empty.style.display='none';
    var typeLabels = { purchase:'Acquisto', secondary_buy:'Secondario', accrual:'Costo accrual', refund:'Rimborso', liquidation:'Liquidazione' };
    tbody.innerHTML = rows.map(function(r){
      var p = _mktProducts.find(function(x){ return x.id===r.product_id; });
      return '<tr>'
        +'<td style="font-family:var(--mono);color:var(--text-muted)">'+fmtDate(r.created_at)+'</td>'
        +'<td>'+(p?esc(p.name):'—')+'</td>'
        +'<td>'+(typeLabels[r.type]||r.type)+'</td>'
        +'<td style="font-family:var(--mono)">'+(r.qty||'—')+'</td>'
        +'<td style="font-family:var(--mono);font-weight:600">'+fmtMoney(r.amount)+'</td>'
        +'<td style="font-size:12px">'+esc(r.method||'—')+'</td>'
        +'<td>'+payBadge(r.status)+'</td>'
        +'<td style="font-size:12px;color:var(--text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.admin_notes||r.bank_reference||'')+'</td>'
      +'</tr>';
    }).join('');
  } catch(e) {
    document.getElementById('txTbody').innerHTML = uiErrorCell(8, 'Caricamento transazioni fallito', e, 'txLoad()');
  }
}


// Bootstrap robusto: aspetta che il parent abbia finito di parsare i suoi
// <script> (puo' succedere che DOMContentLoaded del frame arrivi PRIMA che
// il parent abbia definito uiLoading/supa/etc. — race condition).
function _waitParentReady(cb){
  var tries = 0;
  function check(){
    var ready = (window.parent && window.parent !== window
                 && typeof window.parent.skelRows === 'function'
                 && typeof window.parent.supa === 'function');
    if(ready){ cb(); return; }
    if(++tries > 50){ console.warn('[tx] parent never ready, giving up'); cb(); return; }
    setTimeout(check, 100);
  }
  check();
}
document.addEventListener("DOMContentLoaded", function(){
  _waitParentReady(function(){
    if(typeof txLoad === 'function'){
      try{ txLoad(); }catch(e){ console.error("[tx frame]", e); }
    }
  });
});
</script>
</body>
</html>
