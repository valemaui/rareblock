async function anlStartLiveFetches(card){
  if(!card||!card.id) return;

  // Cache per card.id + mode + condizione/house+grado (per evitare refetch inutili)
  var sig = anlSigFor(card);
  if(anlLiveData._sig === sig){
    // già caricato: ridisegna solo
    anlRenderToday();
    anlRenderProjection();
    return;
  }
  anlLiveData = { _sig: sig };

  // Imposta CM subito (già nella card object)
  var p = card.cardmarket && card.cardmarket.prices;
  if(p){
    var nm = p.trendPrice || p.avg30 || null;
    if(nm){
      // Per raw applica condition factor
      if(anlMode==='raw'){
        var cf = ANL_COND_FACTOR[document.getElementById('anlCond').value]||1.0;
        var ef = document.getElementById('anl1st').value==='yes' ? ANL_FIRST_ED_MULT : 1.0;
        anlLiveData.cm = Math.round(nm*cf*ef*100)/100;
      } else {
        anlLiveData.cm = null; // CM per gradate non è affidabile
      }
    }
  }
  anlLiveData.usdEur = await anlGetUsdEur();

  // Avvia in parallelo
  var setNm = card.set?card.set.name:'';
  var graded = anlMode==='graded';

  // eBay — cascata multi-query in MERGE mode (combina e dedup tutti i risultati)
  (async function(){
    var user = window._anlUserInput || {};
    var houseLabel = graded ? ANL_HOUSES[document.getElementById('anlHouse').value].label : '';
    var scoreVal   = graded ? document.getElementById('anlGradeScore').value : '';

    var nameUser = user.name || card.name;
    var nameApi  = card.name;
    var num      = card.number || user.number || '';
    // Variante "nome semplificato": rimuove suffix come -EX, -GX, -V, -VMAX, -VSTAR
    // (es. "Groudon-EX" → "Groudon"). Spesso i venditori non includono il suffisso.
    var nameSimple = nameUser ? nameUser.replace(/[-\s]?(EX|GX|V|VMAX|VSTAR|VUNION|TAG TEAM|BREAK|LEGEND)$/i,'').trim() : '';
    if(nameSimple && nameSimple!==nameUser && nameSimple.length<3) nameSimple = ''; // troppo corto, scarta

    // Varianti di scrittura del grade (molti venditori usano forme diverse)
    var gradeVariants = graded
      ? [' '+houseLabel+' '+scoreVal, ' '+houseLabel+'-'+scoreVal, ' '+houseLabel+scoreVal]
      : [''];
    var gradeSfx = gradeVariants[0];

    var queries = [];
    function addQ(s){ s=s.trim().replace(/\s+/g,' '); if(s && queries.indexOf(s)<0) queries.push(s); }

    // ─── Query SEMPLICI prima (più match) → SPECIFICHE dopo (filtri fini) ───
    // User report: "Tropical Wind PSA 9" trova 16 risultati,
    //              "Tropical Wind 26 Nintendo Black Star Promos PSA 9 pokemon" trova 0.
    // eBay già filtra _sacat=2611 (Pokemon) → "pokemon" parola spesso ridondante.
    // Query lunghe con set name penalizzano il fuzzy matching di eBay.
    // Edge function early-exit a 15 items: le prime query semplici dominano il sample.

    if(graded){
      // GRADED: priorità query corte con grade
      // 1. Più semplice: nome + voto (stile user "Tropical Wind PSA 9")
      if(nameUser)                 addQ(nameUser+gradeSfx);
      // 2. Nome semplificato + voto (utile per "Groudon-EX" → "Groudon")
      if(nameSimple && nameSimple!==nameUser) addQ(nameSimple+gradeSfx);
      // 3. Nome + numero + voto
      if(nameUser && num)          addQ(nameUser+' '+num+gradeSfx);
      // 4. Nome + voto + "pokemon" (utile se categoria sbagliata)
      if(nameUser)                 addQ(nameUser+gradeSfx+' pokemon');
      // 5. Nome + numero + voto + "pokemon"
      if(nameUser && num)          addQ(nameUser+' '+num+gradeSfx+' pokemon');
      // 6. Nome semplificato + numero + voto
      if(nameSimple && num)        addQ(nameSimple+' '+num+gradeSfx);
      // 7. Nome API ufficiale (se diverso) + voto
      if(nameApi && nameApi!==nameUser) addQ(nameApi+gradeSfx);
      // 8. SPECIFICA: nome + numero + set + voto (last resort)
      if(nameUser && num && setNm) addQ(nameUser+' '+num+' '+setNm+gradeSfx);
    } else {
      // RAW: priorità nome+numero (carta singola identificabile da numero)
      if(nameUser && num)          addQ(nameUser+' '+num);
      if(nameSimple && num && nameSimple!==nameUser) addQ(nameSimple+' '+num);
      if(nameUser && num)          addQ(nameUser+' '+num+' pokemon');
      if(nameUser)                 addQ(nameUser);
      if(nameApi && nameApi!==nameUser && num) addQ(nameApi+' '+num);
      if(nameUser && num && setNm) addQ(nameUser+' '+num+' '+setNm);
    }

    // URL su eBay IT (EUR) — valuta primaria
    var urls = queries.map(function(q){
      // _sop=13 = "Recently sold" — stessa ordinamento del link "apri →" così
      // la fetch backend vede esattamente la stessa pagina del browser utente.
      return 'https://www.ebay.it/sch/i.html?_nkw='+encodeURIComponent(q)+'&LH_Sold=1&LH_Complete=1&_sacat=2611&_sop=13&_ipg=240';
    });

    // Fallback eBay.de: query semplice (nome + voto, NO 'pokemon' NO setNm)
    if(nameUser){
      var deQ = graded ? (nameUser+gradeSfx) : (nameUser+(num?' '+num:''));
      urls.push('https://www.ebay.de/sch/i.html?_nkw='+encodeURIComponent(deQ)+'&LH_Sold=1&LH_Complete=1&_sacat=2611&_sop=13&_ipg=240');
    }
    // Fallback eBay.com: query semplice (nome + voto)
    if(nameUser && graded){
      urls.push('https://www.ebay.com/sch/i.html?_nkw='+encodeURIComponent(nameUser+gradeSfx)+'&LH_Sold=1&LH_Complete=1&_sacat=2611&_sop=13&_ipg=240');
    }

    // ─── DIAGNOSTICA: log queries effettivamente inviate ──
    // User feedback: assicurarsi che la cascata non finisca con queries lunghe
    // anche se UI link "apri →" mostra solo la prima.
    try{
      console.group('%c[Analizza] eBay sold cascade — '+queries.length+' queries + '+(urls.length-queries.length)+' fallbacks','color:#06b6d4;font-weight:bold');
      console.log('Mode:', graded?'GRADED ('+houseLabel+' '+scoreVal+')':'RAW');
      queries.forEach(function(q,i){ console.log((i+1)+'. ebay.it', q); });
      urls.slice(queries.length).forEach(function(u,i){
        var h = new URL(u).host;
        var nkw = decodeURIComponent((u.match(/_nkw=([^&]+)/)||[])[1]||'');
        console.log((queries.length+i+1)+'. '+h, nkw);
      });
      console.groupEnd();
    }catch(e){}

    try{
      // MERGE MODE: combina tutti gli URL, dedup per (titleNormalized, price, currency).
      // Restituisce items[] con titoli — usati dal client per filtri raw/graded e lingua.
      var data=await anlFetchSmooth({source:'ebay_sold', urls:urls, url:urls[0], min_hits:3, merge:true});
      if(data.error && (!data.items || !data.items.length)){ anlPopEbay(data,data.error); return; }
      anlPopEbay(data);
    }catch(e){ anlPopEbay(null,e.message||'errore rete'); }
  })();

  // eBay LIVE ASKS — inserzioni attive (non venduti) per stesso target
  // Indicatore "interesse di mercato": prezzo richiesto vs prezzo realmente
  // pagato (sold). Spread elevato → carta poco liquida o prezzata troppo alta.
  (async function(){
    var user = window._anlUserInput || {};
    var houseLabel = graded ? ANL_HOUSES[document.getElementById('anlHouse').value].label : '';
    var scoreVal   = graded ? document.getElementById('anlGradeScore').value : '';
    var nameUser = user.name || card.name;
    var num      = card.number || user.number || '';
    var nameSimple = nameUser ? nameUser.replace(/[-\s]?(EX|GX|V|VMAX|VSTAR|VUNION|TAG TEAM|BREAK|LEGEND)$/i,'').trim() : '';
    if(nameSimple && nameSimple.length<3) nameSimple = '';
    var gradeSfx = graded ? ' '+houseLabel+' '+scoreVal : '';

    // Stesso pattern del cascata sold: SEMPLICE prima, SPECIFICO dopo
    var queries = [];
    function addQ(s){ s=s.trim().replace(/\s+/g,' '); if(s && queries.indexOf(s)<0) queries.push(s); }
    if(graded){
      if(nameUser)                 addQ(nameUser+gradeSfx);
      if(nameSimple && nameSimple!==nameUser) addQ(nameSimple+gradeSfx);
      if(nameUser && num)          addQ(nameUser+' '+num+gradeSfx);
      if(nameUser)                 addQ(nameUser+gradeSfx+' pokemon');
      if(nameUser && num)          addQ(nameUser+' '+num+gradeSfx+' pokemon');
      if(nameUser && num && setNm) addQ(nameUser+' '+num+' '+setNm+gradeSfx);
    } else {
      if(nameUser && num)          addQ(nameUser+' '+num);
      if(nameSimple && num && nameSimple!==nameUser) addQ(nameSimple+' '+num);
      if(nameUser)                 addQ(nameUser);
      if(nameUser && num)          addQ(nameUser+' '+num+' pokemon');
    }

    var urls = queries.map(function(q){
      return 'https://www.ebay.it/sch/i.html?_nkw='+encodeURIComponent(q)+'&_sacat=2611&_ipg=240';
    });
    if(nameUser && num){
      urls.push('https://www.ebay.de/sch/i.html?_nkw='+encodeURIComponent(nameUser+' '+num+gradeSfx+' pokemon')+'&_sacat=2611&_ipg=240');
      urls.push('https://www.ebay.com/sch/i.html?_nkw='+encodeURIComponent(nameUser+' '+num+gradeSfx+' pokemon')+'&_sacat=2611&_ipg=240');
    }

    try{
      var data = await anlFetchSmooth({source:'ebay_active', urls:urls, url:urls[0], min_hits:3, merge:true});
      anlPopEbayActive(data);
    }catch(e){ anlPopEbayActive(null, e.message||'errore rete'); }
  })();

  // PriceCharting — cascata multi-query
  (async function(){
    var user = window._anlUserInput || {};
    var nameUser = user.name || card.name;
    var nameApi  = card.name;
    var num      = card.number || '';

    var queries=[];
    function addQ(s){ s=s.trim().replace(/\s+/g,' '); if(s && queries.indexOf(s)<0) queries.push(s); }
    if(nameUser && setNm) addQ(nameUser+' '+setNm);
    if(nameApi && setNm && nameApi!==nameUser) addQ(nameApi+' '+setNm);
    if(nameUser && num)   addQ(nameUser+' '+num);
    if(nameUser)          addQ(nameUser);

    var urls = queries.map(function(q){
      return 'https://www.pricecharting.com/search-products?q='+encodeURIComponent(q)+'&type=prices';
    });
    var cardNameFull = nameUser + (num ? ' '+num : '');
    var pcFirstEdition = (anlMode==='raw' && document.getElementById('anl1st').value==='yes');

    try{
      var data=await anlFetchSmooth({source:'pricecharting', urls:urls, url:urls[0], card_name:cardNameFull, first_edition:pcFirstEdition});
      if(data.error){ anlPopPc(null,data.error); return; }
      anlLiveData.pc=data.prices;
      anlLiveData.pcProductUrl=data.url||null;
      anlLiveData.pcProductTitle=(data.prices&&data.prices.productTitle)||null;

      // Diagnostica: log dei sold listings per grade (sample size) + se il
      // merge da /recent-sales ha avuto effetto.
      try{
        console.group('%c[Analizza] PC sold listings per grade','color:#10b981;font-weight:bold');
        if(data._recent_sales_merged){
          console.log('✓ /recent-sales merged ('+data._recent_sales_hits+' total hits)');
          console.log('  URL:', data._recent_sales_url);
        } else {
          console.warn('✗ /recent-sales non disponibile o vuoto');
        }
        var gfl = data.prices && data.prices.grades_from_listings;
        if(gfl){
          var rows = Object.keys(gfl).map(function(k){
            return {
              key: k,
              count: gfl[k].count || 0,
              median: gfl[k].median,
              currency: gfl[k].currency_symbol,
              min: gfl[k].min,
              max: gfl[k].max,
            };
          }).sort(function(a,b){ return b.count - a.count; });
          console.table(rows);
        } else {
          console.warn('Nessun grades_from_listings — solo aggregati API');
        }
        console.groupEnd();
      }catch(e){}

      anlPopPc(data.prices);
    }catch(e){ anlPopPc(null,e.message||'errore rete'); }
  })();

  // Cardmarket — fetch listings reali, parse commenti per grading
  // (sostituisce/integra il dato trend dalla TCG API)
  (async function(){
    try{
      var cond = document.getElementById('anlCond').value;
      var lang = document.getElementById('anlLang').value;
      var is1st= document.getElementById('anl1st').value==='yes';
      var setId= card.set?card.set.id:null;
      var cmUrl = (rbParentFn("buildCMDirectUrl")||function(){return"#"})(card.name, setId, card.number, cond, lang, 'Normal', is1st, setNm);
      // In graded mode forziamo minCondition a NM per non perdere listings (anche
      // i venditori di carte gradate spesso non impostano la condizione raw).
      // Per non interferire col link "apri →" esterno costruisco un URL parallelo.
      var fetchUrl = cmUrl;
      var data = await anlFetchSmooth({source:'cardmarket', url:fetchUrl, urls:[fetchUrl], debug:true});
      anlPopCm(data, card);
    }catch(e){ anlPopCm({error:e.message||'errore rete'}, card); }
  })();

  // Render CM già disponibile e sezioni
  anlRenderToday();
  anlRenderProjection();
}

function anlSigFor(card){
  return [
    card.id, anlMode,
    document.getElementById('anlLang').value,
    anlMode==='raw' ? document.getElementById('anlCond').value : '',
    anlMode==='raw' ? document.getElementById('anl1st').value : '',
    anlMode==='graded' ? document.getElementById('anlHouse').value : '',
    anlMode==='graded' ? document.getElementById('anlGradeScore').value : '',
  ].join('|');
}

// ─── HELPER condivise: parser grading + lingua su titoli/commenti ─────────────
// Riconosce indicatori di grading in un testo (titolo eBay o commento CM).
// Casi: "PSA 9", "PSA-9", "PSA9", "BGS 8.5", "BGS8.5", "CGC 10", "ACE MINT 9"
// Ritorna {house, score} oppure null.
function anlParseGrading(text){
  if(!text) return null;
  var s = String(text).replace(/\s+/g,' ').trim();
  // Coppie (house canonica, regex name) — applichiamo il pattern completo
  // direttamente, senza pre-test con \bHOUSE\b che fallisce su "BGS8" perché
  // tra S e 8 non c'è word boundary (entrambi word char).
  var houses = [
    ['PSA','PSA'],
    ['BGS','(?:BGS|Beckett)'],
    ['CGC','CGC'],
    ['SGC','SGC'],
    ['HGA','HGA'],
    ['GMA','GMA'],
    ['TAG','TAG'],
    ['ARS','ARS'],
    ['GG','(?:GG|GetGraded)'],
    ['ACE','ACE']
  ];
  for(var i=0;i<houses.length;i++){
    var house = houses[i][0], houseStr = houses[i][1];
    var rx = new RegExp(
      '\\b'+houseStr+
      '(?:\\s*[A-Za-z]{0,8})?'+
      '\\s*[-:.\\s]?\\s*'+
      '(10(?:\\.0)?|[1-9](?:\\.5)?)\\b',
      'i'
    );
    var m = s.match(rx);
    if(m){
      var score = parseFloat(m[1]);
      if(score>=1 && score<=10) return { house:house, score:score };
    }
  }
  return null;
}

// Rileva la lingua dichiarata nel titolo eBay/CM. Marker espliciti hanno
// priorità; assenza di marker = sconosciuto (NON assumiamo "EN by default").
function anlDetectLang(text){
  if(!text) return null;
  var s = ' '+String(text).toLowerCase()+' ';
  // Pattern ordinati: i più specifici prima
  if(/\b(italian|italiana|italiano|ita)\b/.test(s) || /\bita\b/.test(s)) return 'ITA';
  if(/\b(japanese|giapponese|japones|jpn|jap)\b/.test(s)) return 'JPN';
  if(/\b(german|deutsch|tedesco|deu|ger)\b/.test(s)) return 'DEU';
  if(/\b(french|francese|francais|français|fra|fr)\b/.test(s)) return 'FRA';
  if(/\b(spanish|spagnolo|español|espanol|esp|spa)\b/.test(s)) return 'ESP';
  if(/\b(portuguese|portoghese|português|portugues|por)\b/.test(s)) return 'POR';
  if(/\b(korean|coreano|kor)\b/.test(s)) return 'KOR';
  if(/\b(chinese|cinese|chs|cht)\b/.test(s)) return 'CHI';
  if(/\b(english|inglese|eng)\b/.test(s)) return 'ENG';
  return null; // unknown — non azzardiamo
}

// ─── HELPER: normalizza prezzi eBay usando CM come ancora di plausibilità ─
// Converte tutto in EUR, filtra via banda [lo, hi] ancorata al CM trend (se disponibile),
// poi applica una seconda passata MAD per gli outlier statistici residui.
// Se data.items è presente, applica anche filtri raw/graded basati sul titolo
// e calcola statistiche di lingua per warning di mismatch.
function anlSanitizeEbay(data, cmRefEur, rate, graded, userLang){
  if(!data || !data.prices || !data.prices.length) return data;

  // ── PRE-FILTER per items con titolo (se disponibili) ──
  // Quando abbiamo i titoli (data.items) possiamo:
  //   • In graded mode: tenere SOLO items con grading nel titolo (esclude raw)
  //   • In raw mode:    escludere items con grading nel titolo (esclude graded)
  //   • Rilevare lingua e segnalare mismatch
  var langStats = { ITA:0, ENG:0, JPN:0, DEU:0, FRA:0, ESP:0, POR:0, KOR:0, CHI:0, unknown:0 };
  var rawCount = 0, gradedCount = 0;
  var filteredItems = null;

  if(data.items && data.items.length){
    var keptItems = [];
    var droppedByMode = 0;
    data.items.forEach(function(it){
      var g = anlParseGrading(it.title);
      if(g) gradedCount++; else rawCount++;
      var lang = anlDetectLang(it.title);
      langStats[lang || 'unknown']++;

      // Filtro per modalità
      if(graded){
        // Tieni solo items con grading nel titolo (qualsiasi casa+grado purché presente).
        // Filtro più stretto sul match esatto avverrà nel sanitize a valle.
        if(g) keptItems.push(Object.assign({}, it, {_grading:g, _lang:lang}));
        else droppedByMode++;
      } else {
        if(!g) keptItems.push(Object.assign({}, it, {_grading:null, _lang:lang}));
        else droppedByMode++;
      }
    });

    // Se il filtro modalità lascia troppo poco (<3) e abbiamo abbastanza dati totali (>=6),
    // disattiva il filtro e ritorna a tutti gli items con un warning.
    if(keptItems.length < 3 && data.items.length >= 6){
      // Manteniamo tutti gli items ma marchiamo come "filtro modalità inefficace"
      filteredItems = data.items.map(function(it){
        return Object.assign({}, it, {_grading:anlParseGrading(it.title), _lang:anlDetectLang(it.title)});
      });
      data._modeFilterAborted = true;
    } else {
      filteredItems = keptItems;
      data._modeFilterDropped = droppedByMode;
    }
  }

  // ── Normalizzazione prezzi in EUR ──
  // Se abbiamo filteredItems usa quelli; altrimenti usa data.prices (legacy)
  var inEur;
  if(filteredItems){
    inEur = filteredItems.map(function(it){
      var c = it.currency || data.currency || 'EUR';
      if(c==='USD') return it.price * rate;
      if(c==='GBP') return it.price * 1.17 * rate;
      return it.price;
    });
  } else {
    inEur = data.prices.map(function(p){
      if(data.currency==='USD')      return p * rate;
      if(data.currency==='GBP')      return p * 1.17 * rate;
      return p;
    });
  }

  if(inEur.length === 0){
    // Nessun item dopo il filtro modalità: ritorna struttura "vuota dopo filtro"
    return Object.assign({}, data, {
      pricesEur: [], medianEur: null, avgEur: null, minEur: null, maxEur: null,
      countEur: 0, filteredOut: data.prices.length, cmAnchor: null,
      confidenceLevel: 'none',
      langStats: langStats, rawCount: rawCount, gradedCount: gradedCount,
    });
  }

  // ── Filtro CM-anchored ──
  var lo=null, hi=null, anchored=false;
  if(cmRefEur && cmRefEur>0){
    if(graded){ lo = cmRefEur * 0.5;  hi = cmRefEur * 80; }
    else       { lo = cmRefEur * 0.3;  hi = cmRefEur * 4;  }
    anchored = true;
  }

  var plausible = anchored ? inEur.filter(function(p){return p>=lo && p<=hi;}) : inEur.slice();
  if(anchored && (plausible.length < 3 || plausible.length < inEur.length*0.4)){
    plausible = inEur.slice();
    anchored = false;
  }

  // ── MAD filter ──
  plausible.sort(function(a,b){return a-b;});
  var mid = Math.floor(plausible.length/2);
  var med = plausible.length%2===0 ? (plausible[mid-1]+plausible[mid])/2 : plausible[mid];
  var absDevs = plausible.map(function(p){return Math.abs(p-med);}).sort(function(a,b){return a-b;});
  var mad = absDevs[Math.floor(absDevs.length/2)] || med*0.1;
  var finalSet;
  if(plausible.length >= 5 && mad > 0){
    finalSet = plausible.filter(function(p){return Math.abs(p-med) <= 4*mad;});
    if(finalSet.length < 3) finalSet = plausible;
  } else {
    finalSet = plausible;
  }

  finalSet.sort(function(a,b){return a-b;});
  var n = finalSet.length;
  var mid2 = Math.floor(n/2);
  var median = n%2===0 ? (finalSet[mid2-1]+finalSet[mid2])/2 : finalSet[mid2];
  var sum = finalSet.reduce(function(a,b){return a+b;},0);
  var avg = sum/n;

  var conf = n>=10 ? 'high' : (n>=5 ? 'medium' : (n>=3 ? 'low' : 'very-low'));

  return Object.assign({}, data, {
    pricesEur: finalSet,
    medianEur: median,
    avgEur: avg,
    minEur: finalSet[0],
    maxEur: finalSet[n-1],
    countEur: n,
    filteredOut: data.prices.length - n,
    cmAnchor: anchored ? cmRefEur : null,
    confidenceLevel: conf,
    langStats: langStats,
    rawCount: rawCount,
    gradedCount: gradedCount,
  });
}

// Set confidence dot (●) color basato su conteggio/qualità
function anlSetDot(id, conf){
  var el = document.getElementById(id); if(!el) return;
  el.textContent = '●';
  el.style.fontSize = '10px';
  el.style.marginLeft = 'auto';
  var color = {
    'high':   'var(--success)',
    'medium': 'var(--warning)',
    'low':    'var(--danger)',
    'very-low': 'var(--text-subtle)',
    'none':   'var(--text-subtle)',
  }[conf] || 'var(--text-subtle)';
  el.style.color = color;
  el.title = {
    'high':   'alta confidenza (≥10 campioni)',
    'medium': 'confidenza media (5-9 campioni)',
    'low':    'bassa confidenza (3-4 campioni)',
    'very-low': 'campione insufficiente (<3)',
    'none':   'nessun dato',
  }[conf] || '';
}

// ─── CARDMARKET — listings reali con split raw/graded da commenti ────────────
// Parse delle listings restituite dall'edge function. Ogni listing può avere:
//   • grading: { house, score } estratto dal commento
//   • comment: testo originale del seller
// Strategia:
//   • Mode RAW: usa solo listings SENZA grading (raw), calcola mediana
//     escludendo eventuali listing gradati che inquinerebbero la media
//   • Mode GRADED: usa solo listings con grading match (house+score esatto),
//     o gradate generiche se nessun match esatto + warning sul campione
//   • Fallback: se troppo pochi listings dopo il filtro (<3) torna al trend
//     dalla TCG API (che è il dato originale che avevamo)
// ─── TABELLA eBay raggruppata per (house, score, lingua) ──
// Logica analoga a CM: dato l'array di sold con grading parsato (e lingua
// rilevata dal titolo), raggruppa e mostra mediana per ogni combo.
// Differenza vs CM: i prezzi sono già normalizzati in EUR a livello di
// anlSanitizeEbay, e arrivano dai TITOLI (non da commenti seller).
function anlRenderEbGradeTable(items, targetHouse, targetScore, targetLang){
  var tblEl = document.getElementById('anlSrcEbTable');
  if(!tblEl) return;
  if(!items || !items.length){
    tblEl.style.display = 'none';
    tblEl.innerHTML = '';
    return;
  }
  // Filtra solo i sold con grading parsato (tabella ha senso solo per gradate)
  var graded = items.filter(function(it){ return it._grading; });
  if(!graded.length){
    tblEl.style.display = 'none';
    tblEl.innerHTML = '';
    return;
  }
  // Raggruppa per (house, score, language)
  var groups = {};
  graded.forEach(function(it){
    var lang = it._lang || '?';
    var k = it._grading.house + '|' + it._grading.score + '|' + lang;
    if(!groups[k]) groups[k] = {
      house: it._grading.house,
      score: it._grading.score,
      language: lang,
      prices: []
    };
    // Conversione in EUR (rate da anlLiveData)
    var rate = anlLiveData.usdEur || ANL_USD_EUR_FALLBACK;
    var p = it.price;
    if(it.currency === 'USD')      p = it.price * rate;
    else if(it.currency === 'GBP') p = it.price * 1.17 * rate;
    groups[k].prices.push(p);
  });
  var rows = Object.keys(groups).map(function(k){
    var g = groups[k];
    g.prices.sort(function(a,b){return a-b;});
    var mid = Math.floor(g.prices.length/2);
    g.median = g.prices.length%2===0 ? (g.prices[mid-1]+g.prices[mid])/2 : g.prices[mid];
    g.count = g.prices.length;
    g.isTarget = (g.house === targetHouse && Math.abs(g.score - targetScore) < 0.01);
    g.isPerfect = g.isTarget && (targetLang ? g.language === targetLang : true);
    return g;
  });
  rows.sort(function(a,b){
    // Primario: score discendente (10, 9.5, 9, 8.5, 8...)
    if(a.score !== b.score) return b.score - a.score;
    // Secondario: perfect match prima a parità di score
    if(a.isPerfect !== b.isPerfect) return a.isPerfect ? -1 : 1;
    if(a.isTarget !== b.isTarget) return a.isTarget ? -1 : 1;
    // Terziario: casa alfabetica
    if(a.house !== b.house) return a.house < b.house ? -1 : 1;
    return 0;
  });
  var langIcon = {
    ITA: '🇮🇹', ENG: '🇬🇧', JPN: '🇯🇵', DEU: '🇩🇪', FRA: '🇫🇷',
    ESP: '🇪🇸', POR: '🇵🇹', KOR: '🇰🇷', CHI: '🇨🇳', RUS: '🇷🇺', NLD: '🇳🇱'
  };
  var html = '<table>'
    + '<thead><tr><th></th><th>Casa</th><th>Voto</th><th>Lingua</th><th style="text-align:right">€</th><th style="text-align:center">N</th></tr></thead>'
    + '<tbody>'
    + rows.map(function(r){
        var priceStr = r.count > 1
          ? '€'+r.median.toFixed(0)+' <span style="opacity:0.5;font-size:9px">med</span>'
          : '€'+r.prices[0].toFixed(0);
        var langStr = r.language === '?'
          ? '<span style="opacity:0.5">?</span>'
          : (langIcon[r.language] || '') + ' ' + r.language;
        var rowClass = r.isPerfect ? 'match-target' : (r.isTarget ? 'match-target' : '');
        // Freccia ▸ solo su match al 100% (perfect: house+score+lingua)
        var arrowCell = r.isPerfect
          ? '<td class="col-arrow" style="color:var(--accent);font-weight:700;text-align:center;width:18px">▸</td>'
          : '<td class="col-arrow" style="width:18px"></td>';
        return '<tr'+(rowClass?' class="'+rowClass+'"':'')+'>'
          + arrowCell
          + '<td class="col-grade">'+r.house+'</td>'
          + '<td class="col-grade">'+r.score+'</td>'
          + '<td class="col-grade" style="font-size:10px">'+langStr+'</td>'
          + '<td class="col-price">'+priceStr+'</td>'
          + '<td class="col-count">'+r.count+'</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
  tblEl.innerHTML = html;
  tblEl.style.display = '';
}

// ─── TABELLA PriceCharting per grade ──
// PC è strutturalmente diverso: i grade sono nei CAMPI dell'API (psa10,
// grade9, ecc), non nei commenti. La tabella mostra TUTTI i grade
// disponibili, preferendo i prezzi da grades_from_listings (sold reali)
// quando presenti, fallback ai campi aggregati.
// PC è US-centric → lingua sempre ENG (PC non differenzia per lingua).
function anlRenderPcGradeTable(prices, targetHouse, targetScore){
  var tblEl = document.getElementById('anlSrcPcTable');
  if(!tblEl) return;
  if(!prices){
    tblEl.style.display = 'none';
    tblEl.innerHTML = '';
    return;
  }
  var rate = anlLiveData.usdEur || ANL_USD_EUR_FALLBACK;
  var pcCur = prices.currency || 'USD';
  function toEur(v){
    if(v == null) return null;
    if(pcCur === 'EUR')      return v;
    if(pcCur === 'GBP')      return v * 1.17 * rate;
    return v * rate; // USD default
  }

  // Mappa campi aggregati PC → (house canonica, score)
  // Da capire: PC usa "grade7", "grade8", "grade9", "grade9.5", "psa10" come
  // scala generica (PSA-equivalent). Le case alternative (BGS, CGC) di
  // solito non hanno endpoint dedicati nelle API PC pubbliche.
  var aggregateMap = [
    { key: 'grade7',  house: 'PSA', score: 7 },
    { key: 'grade8',  house: 'PSA', score: 8 },
    { key: 'grade9',  house: 'PSA', score: 9 },
    { key: 'grade95', house: 'PSA', score: 9.5 },
    { key: 'psa10',   house: 'PSA', score: 10 },
    { key: 'bgs10',   house: 'BGS', score: 10 },
    { key: 'cgc10',   house: 'CGC', score: 10 },
  ];

  var rowsMap = {}; // key = house|score → riga
  function ensureRow(house, score){
    var k = house+'|'+score;
    if(!rowsMap[k]) rowsMap[k] = { house:house, score:score, eurFromListings:null, eurFromAggregate:null, count:0, min:null, max:null };
    return rowsMap[k];
  }

  // 1) Da sold listings reali (preferito)
  if(prices.grades_from_listings){
    Object.keys(prices.grades_from_listings).forEach(function(lk){
      var L = prices.grades_from_listings[lk];
      if(!L || L.median == null) return;
      var parts = lk.split('_');
      if(parts.length !== 2) return;
      var house = parts[0], score = parseFloat(parts[1]);
      if(isNaN(score)) return;
      var sym = L.currency_symbol || '$';
      var conv = function(v){
        if(v==null) return null;
        if(sym==='€') return v;
        if(sym==='£') return v*1.17*rate;
        return v*rate;
      };
      var row = ensureRow(house, score);
      row.eurFromListings = conv(L.median);
      row.count = L.count || 0;
      row.min = conv(L.min);
      row.max = conv(L.max);
    });
  }

  // 2) Da campi aggregati (fallback)
  aggregateMap.forEach(function(am){
    var v = prices[am.key];
    if(v == null) return;
    var row = ensureRow(am.house, am.score);
    row.eurFromAggregate = toEur(v);
  });

  // Ungraded riga separata in raw mode (mostriamo tabella PC anche in raw
  // se ci sono dati) — opzionale, per ora skip e tabella solo in graded
  var rows = Object.keys(rowsMap).map(function(k){ return rowsMap[k]; });
  rows = rows.filter(function(r){ return r.eurFromListings != null || r.eurFromAggregate != null; });
  if(!rows.length){
    tblEl.style.display = 'none';
    tblEl.innerHTML = '';
    return;
  }
  rows.forEach(function(r){
    r.isTarget = (r.house === targetHouse && Math.abs(r.score - targetScore) < 0.01);
    // Per ranking: usa eurFromListings se presente (dato real), altrimenti aggregate
    r._sortPrice = r.eurFromListings != null ? r.eurFromListings : r.eurFromAggregate;
  });
  rows.sort(function(a,b){
    // Primario: score discendente
    if(a.score !== b.score) return b.score - a.score;
    // Secondario: target prima a parità di score
    if(a.isTarget !== b.isTarget) return a.isTarget ? -1 : 1;
    // Terziario: casa alfabetica
    if(a.house !== b.house) return a.house < b.house ? -1 : 1;
    return 0;
  });

  // Trova riga target per detail view e accesso a listings dettagliati
  var targetRow = rows.filter(function(r){ return r.isTarget; })[0] || null;
  var targetListings = null;
  if(targetRow && prices.grades_from_listings){
    var lk = targetRow.house + '_' + targetRow.score;
    var L = prices.grades_from_listings[lk];
    if(L && L.listings && L.listings.length){
      // Converti prezzi in EUR
      var sym2 = L.currency_symbol || '$';
      var convL = function(v){
        if(v==null) return null;
        if(sym2==='€') return v;
        if(sym2==='£') return v*1.17*rate;
        return v*rate;
      };
      targetListings = L.listings.map(function(it){
        return { priceEur: convL(it.price), date: it.date || null };
      });
    }
  }

  // Header con toggle se ci sono listings dettagliati per il target
  var headerHtml = '';
  if(targetListings && targetListings.length){
    var label = anlPcShowDetail
      ? '◀ vista per grade'
      : '▸ dettaglio venduti '+targetRow.house+' '+targetRow.score+' ('+targetListings.length+')';
    headerHtml = '<div style="display:flex;justify-content:flex-end;padding:4px 6px;border-bottom:1px solid var(--border);background:var(--surface-2,rgba(255,255,255,0.02))">'
      + '<a onclick="anlTogglePcDetail()" style="cursor:pointer;font-size:10px;color:var(--accent);font-family:var(--mono);text-decoration:none">'+label+'</a>'
      + '</div>';
  }

  var html;
  if(anlPcShowDetail && targetListings && targetListings.length){
    // ─── VISTA DETTAGLIO: ultime vendite del target grade ──
    // Ordina per data desc se disponibile, altrimenti mantieni ordine PC (recente prima)
    var sorted = targetListings.slice();
    if(sorted.some(function(l){ return l.date; })){
      sorted.sort(function(a,b){
        if(!a.date && !b.date) return 0;
        if(!a.date) return 1;
        if(!b.date) return -1;
        // Confronto stringa funziona per ISO; per altri formati ordine PC originale
        return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0);
      });
    }
    // Calcola trend rispetto alla prima vendita
    var prices_all = sorted.map(function(l){ return l.priceEur; }).filter(function(p){ return p!=null; });
    var medianL = prices_all.slice().sort(function(a,b){return a-b;})[Math.floor(prices_all.length/2)];

    html = headerHtml + '<table>'
      + '<thead><tr><th>#</th><th>Data</th><th style="text-align:right">€</th><th style="text-align:right" title="Prezzo + spedizione 20€ + dazio 2.7% (solo se valore >€150) + IVA 22% + sdoganamento 15€">€+spese</th><th style="text-align:right">vs med</th></tr></thead>'
      + '<tbody>'
      + sorted.map(function(l, i){
          var dateStr = l.date || '<span style="opacity:0.4">—</span>';
          var deltaStr = '';
          if(l.priceEur != null && medianL){
            var d = ((l.priceEur - medianL) / medianL) * 100;
            var cls = Math.abs(d) < 5 ? 'mute' : (d > 0 ? 'pos' : 'neg');
            var col = cls==='pos' ? 'var(--success)' : (cls==='neg' ? 'var(--danger)' : 'var(--text-muted)');
            deltaStr = '<span style="color:'+col+';font-size:9px">'+(d>=0?'+':'')+d.toFixed(0)+'%</span>';
          }
          var totalEur = anlImportTotal(l.priceEur);
          var totalStr = totalEur != null
            ? '<span style="color:var(--accent)">€'+totalEur.toFixed(0)+'</span>'
            : '<span style="opacity:0.4">—</span>';
          return '<tr>'
            + '<td class="col-grade" style="opacity:0.5">'+(i+1)+'</td>'
            + '<td class="col-grade" style="font-size:10px">'+dateStr+'</td>'
            + '<td class="col-price">€'+(l.priceEur!=null?l.priceEur.toFixed(0):'?')+'</td>'
            + '<td class="col-price" style="font-size:10px">'+totalStr+'</td>'
            + '<td style="text-align:right;padding-right:6px">'+deltaStr+'</td>'
            + '</tr>';
        }).join('')
      + '</tbody></table>';
  } else {
    // ─── VISTA AGGREGATA: tutti i grade (vista corrente) ──
    html = headerHtml + '<table>'
      + '<thead><tr><th></th><th>Casa</th><th>Voto</th><th>Lingua</th><th style="text-align:right">€</th><th style="text-align:right" title="Prezzo + spedizione 20€ + dazio 2.7% (solo se valore >€150) + IVA 22% + sdoganamento 15€">€+spese</th><th style="text-align:center">Sample</th></tr></thead>'
      + '<tbody>'
      + rows.map(function(r){
          var priceVal, priceLabel;
          if(r.eurFromListings != null){

            priceLabel = '€'+priceVal.toFixed(0);

          } else {
            priceVal = r.eurFromAggregate;
            priceLabel = '€'+priceVal.toFixed(0)+' <span style="opacity:0.5;font-size:9px">agg</span>';
          }
          var totalEur = anlImportTotal(priceVal);
          var totalLabel = totalEur != null
            ? '<span style="color:var(--accent)">€'+totalEur.toFixed(0)+'</span>'
            : '<span style="opacity:0.4">—</span>';
          var sampleStr = r.eurFromListings != null
            ? String(r.count || '?')
            : '<span style="opacity:0.5">agg</span>';
          var userLangPc = (document.getElementById('anlLang') || {}).value;
          var isPerfectPc = r.isTarget && (userLangPc==='ENG' || !userLangPc);
          var arrowCell = isPerfectPc
            ? '<td class="col-arrow" style="color:var(--accent);font-weight:700;text-align:center;width:18px">▸</td>'
            : '<td class="col-arrow" style="width:18px"></td>';
          return '<tr'+(r.isTarget?' class="match-target"':'')+'>'
            + arrowCell
            + '<td class="col-grade">'+r.house+'</td>'
            + '<td class="col-grade">'+r.score+'</td>'
            + '<td class="col-grade" style="font-size:10px">🇬🇧 ENG</td>'
            + '<td class="col-price">'+priceLabel+'</td>'
            + '<td class="col-price" style="font-size:10px">'+totalLabel+'</td>'
            + '<td class="col-count">'+sampleStr+'</td>'
            + '</tr>';
        }).join('')
      + '</tbody></table>';
  }
  tblEl.innerHTML = html;
  tblEl.style.display = '';
}

// ─── TABELLA CM raggruppata per (house, score, language) ────────────────
function anlRenderCmGradeTable(gradedListings, targetHouse, targetScore, targetLang){
  var tblEl = document.getElementById('anlSrcCmTable');
  if(!tblEl) return;
  if(!gradedListings || !gradedListings.length){
    tblEl.style.display = 'none';
    tblEl.innerHTML = '';
    return;
  }
  // Raggruppa per (house, score, language). Listing senza lingua → '?'
  var groups = {};
  gradedListings.forEach(function(l){
    var lang = l.language || '?';
    var k = l.grading.house + '|' + l.grading.score + '|' + lang;
    if(!groups[k]) groups[k] = {
      house: l.grading.house,
      score: l.grading.score,
      language: lang,
      prices: []
    };
    groups[k].prices.push(l.price);
  });
  var rows = Object.keys(groups).map(function(k){
    var g = groups[k];
    g.prices.sort(function(a,b){return a-b;});
    var mid = Math.floor(g.prices.length/2);
    g.median = g.prices.length%2===0 ? (g.prices[mid-1]+g.prices[mid])/2 : g.prices[mid];
    g.count = g.prices.length;
    // Match esatto su house+score (la lingua è informativa, non match-critical
    // perché spesso CM ha solo 1-2 listings per combo specifica)
    g.isTarget = (g.house === targetHouse && Math.abs(g.score - targetScore) < 0.01);
    // Match perfetto: anche la lingua coincide → priorità massima
    g.isPerfect = g.isTarget && (targetLang ? g.language === targetLang : true);
    return g;
  });
  // Ordine: score desc primario, poi perfect match a parità, poi house alfabetico
  rows.sort(function(a,b){
    if(a.score !== b.score) return b.score - a.score;
    if(a.isPerfect !== b.isPerfect) return a.isPerfect ? -1 : 1;
    if(a.isTarget !== b.isTarget) return a.isTarget ? -1 : 1;
    if(a.house !== b.house) return a.house < b.house ? -1 : 1;
    return 0;
  });
  // Bandiere/icone lingua compatte
  var langIcon = {
    ITA: '🇮🇹', ENG: '🇬🇧', JPN: '🇯🇵', DEU: '🇩🇪', FRA: '🇫🇷',
    ESP: '🇪🇸', POR: '🇵🇹', KOR: '🇰🇷', CHI: '🇨🇳', RUS: '🇷🇺', NLD: '🇳🇱'
  };
  var html = '<table>'
    + '<thead><tr><th></th><th>Casa</th><th>Voto</th><th>Lingua</th><th style="text-align:right">€</th><th style="text-align:center">N</th></tr></thead>'
    + '<tbody>'
    + rows.map(function(r){
        var priceStr = r.count > 1
          ? '€'+r.median.toFixed(2)+' <span style="opacity:0.5;font-size:9px">med</span>'
          : '€'+r.prices[0].toFixed(2);
        var langStr = r.language === '?'
          ? '<span style="opacity:0.5">?</span>'
          : (langIcon[r.language] || '') + ' ' + r.language;
        var rowClass = r.isPerfect ? 'match-target' : (r.isTarget ? 'match-target' : '');
        // Freccia ▸ solo su perfect match (house+score+lingua)
        var arrowCell = r.isPerfect
          ? '<td class="col-arrow" style="color:var(--accent);font-weight:700;text-align:center;width:18px">▸</td>'
          : '<td class="col-arrow" style="width:18px"></td>';
        return '<tr'+(rowClass?' class="'+rowClass+'"':'')+'>'
          + arrowCell
          + '<td class="col-grade">'+r.house+'</td>'
          + '<td class="col-grade">'+r.score+'</td>'
          + '<td class="col-grade" style="font-size:10px">'+langStr+'</td>'
          + '<td class="col-price">'+priceStr+'</td>'
          + '<td class="col-count">'+r.count+'</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
  tblEl.innerHTML = html;
  tblEl.style.display = '';
}

// ── anlCmImportLive: trigger userscript Tampermonkey per raccogliere prezzi
//    live dalla pagina Cardmarket. Apre tab CM, registra handler sul parent
//    via _rbRegisterPriceHandler (stesso meccanismo del Collector verify).
//    Se userscript installato, dopo qualche secondo arriva postMessage con
//    listings (incluse carte gradate); altrimenti timeout 30s con messaggio
//    chiaro all'utente.
window.anlCmImportLive = async function(){
  var btn   = document.getElementById('anlSrcCmLive');
  var linkA = document.getElementById('anlSrcCmLink');
  var noteEl= document.getElementById('anlSrcCmNote');
  var priceEl=document.getElementById('anlSrcCm');
  if(!btn || !linkA) return;

  var card = window._anlCurrentCard;
  if(!card){ alert('Carica prima una carta nel box Analizza'); return; }

  // Helper per registrare handler sul parent (cross-frame)
  var register   = rbParentFn('_rbRegisterPriceHandler');
  var unregister = rbParentFn('_rbUnregisterPriceHandler');
  if(!register || !unregister){
    if(noteEl) noteEl.textContent = 'bridge price handler non disponibile';
    return;
  }

  var origLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = '↻ importazione…';
  if(priceEl){ priceEl.classList.add('loading'); }
  if(noteEl) noteEl.textContent = 'apro Cardmarket — attendo userscript…';

  // Apri la tab CM (stesso URL del link "apri →"). Necessario open prima
  // della Promise per non perdere il gesto utente (popup blocker).
  var cmTab;
  try { cmTab = window.open(linkA.href, '_blank'); } catch(_){}
  if(!cmTab){
    if(noteEl) noteEl.textContent = 'browser ha bloccato il popup CM';
    btn.disabled = false; btn.textContent = origLabel;
    return;
  }

  var idx = 'anl_'+Date.now();
  var result = await new Promise(function(resolve){
    var timer = setTimeout(function(){ resolve({_timeout:true}); }, 35000);
    register(idx, function(prices, data, listings){
      clearTimeout(timer);
      resolve({ prices: prices, listings: listings||[], status: data&&data.status, reason: data&&data.reason });
    });
  });

  if(result && result._timeout){
    unregister(idx);
    if(noteEl) noteEl.textContent = 'timeout 35s — userscript Tampermonkey non rilevato';
    if(priceEl) priceEl.classList.remove('loading');
    btn.disabled = false; btn.textContent = origLabel;
    return;
  }
  if(result && result.status === 'no_prices'){
    if(noteEl) noteEl.textContent = 'nessuna offerta sulla pagina CM';
    if(priceEl) priceEl.classList.remove('loading');
    btn.disabled = false; btn.textContent = origLabel;
    return;
  }
  if(!result || !result.listings || !result.listings.length){
    if(noteEl) noteEl.textContent = 'nessun listing ricevuto';
    if(priceEl) priceEl.classList.remove('loading');
    btn.disabled = false; btn.textContent = origLabel;
    return;
  }

  // Successo: passa i listings al render normale di anlPopCm.
  // Trasformo nella shape attesa: {listings: [{price, condition, comment, ...}, ...]}
  // Il parser anlParseGrading riconoscerà PSA/BGS/CGS dai comment.
  var data = {
    listings: result.listings.map(function(l){
      return {
        price:     l.price,
        condition: l.condition || 'NM',
        comment:   l.comment || l.note || l.seller_comment || l.label || '',
      };
    }),
    _summary: { source: 'userscript_live', count: result.listings.length },
  };
  try { anlPopCm(data, card); } catch(e){ console.warn('anlPopCm error', e); }

  // Chiudi tab CM dopo breve delay (lascia all'utente vedere se vuole)
  try { if(cmTab && !cmTab.closed) setTimeout(function(){ try{cmTab.close();}catch(_){} }, 1500); } catch(_){}

  btn.disabled = false; btn.textContent = origLabel;
};

function anlPopCm(data, card){
  // Salva la card corrente per anlCmImportLive (rilettura post-render)
  window._anlCurrentCard = card;
  var priceEl=document.getElementById('anlSrcCm');
  var noteEl =document.getElementById('anlSrcCmNote');
  var tblEl  =document.getElementById('anlSrcCmTable');
  var graded = anlMode==='graded';
  var house  = graded ? document.getElementById('anlHouse').value : null;
  var score  = graded ? parseFloat(document.getElementById('anlGradeScore').value) : null;
  var userLang = document.getElementById('anlLang') ? document.getElementById('anlLang').value : null;

  // ─── DIAGNOSTICA EDGE ──
  // Logga sempre il _summary e il debug se presenti, così possiamo vedere
  // cosa l'edge function ha estratto e dove l'extraction sta fallendo.
  if(data && (data._summary || data.debug)){
    try{
      console.group('%c[Analizza] CM edge diagnostica','color:#10b981;font-weight:bold');
      if(data._summary){
        console.log('Summary:', data._summary);
      }
      if(data.debug){
        var dbg = data.debug;
        console.log('http_status:', dbg.http_status, '| html_len:', dbg.html_length);
        console.log('article_row_matches:', dbg.article_row_matches, '| euro_symbol_matches:', dbg.euro_symbol_matches, '| price_json_matches:', dbg.price_json_matches);
        console.log('has_consent_wall:', dbg.has_consent_wall, '| is_geo_block:', dbg.is_geo_block, '| has_next_data:', dbg.has_next_data);
        if(dbg.next_data_info) console.log('NEXT_DATA info:', dbg.next_data_info);
        if(dbg.article_row_sample){
          console.log('%c--- Sample prima article-row (4000ch) ---','color:#f59e0b');
          console.log(dbg.article_row_sample);
        }
        if(dbg.price_context_sample){
          console.log('%c--- Sample HTML attorno al prezzo più alto (per vedere il commento) ---','color:#f59e0b');
          console.log(dbg.price_context_sample);
        }
        if(dbg.grading_anchor_samples && dbg.grading_anchor_samples.length){
          console.log('%c--- Grading marker trovati nel HTML grezzo (±400ch ognuno) ---','color:#10b981;font-weight:bold');
          dbg.grading_anchor_samples.forEach(function(s, i){
            console.log('%c['+s.marker+']','color:#10b981;font-weight:bold');
            console.log(s.context);
            console.log('---');
          });
        } else if(dbg.grading_anchor_samples){
          console.warn('NESSUN grading marker trovato nel HTML grezzo — possibile che CM non li abbia restituiti, OR il pattern non li riconosce');
        }
      }
      console.groupEnd();
    }catch(e){}
  }

  // Fallback al trend TCG-API se errore o nessun listing
  function fallbackTrend(reason){
    var p = card && card.cardmarket && card.cardmarket.prices;
    var trend = p ? (p.trendPrice || p.avg30 || null) : null;
    if(priceEl){
      priceEl.classList.remove('loading');
      if(trend != null){
        priceEl.textContent = '€'+trend.toFixed(2);
        priceEl.classList.remove('na');
      } else {
        priceEl.textContent = '—';
        priceEl.classList.add('na');
      }
    }
    if(noteEl){
      var bits = [];
      if(reason) bits.push(reason);
      if(p && p.trendPrice) bits.push('trend €'+p.trendPrice.toFixed(2));
      if(p && p.avg30)      bits.push('30gg €'+p.avg30.toFixed(2));
      if(p && p.lowPrice)   bits.push('low €'+p.lowPrice.toFixed(2));
      noteEl.textContent = bits.length ? bits.join(' · ') : 'nessun dato';
    }
    anlSetDot('anlSrcCmDot','low');
    // Pulisci tabella gradate (caso fallback = nessun graded utile)
    anlRenderCmGradeTable(null);
    // anlLiveData.cm già impostato in anlStartLiveFetches dal trend TCG (con condition factor per raw)
    anlRenderToday();
    anlRenderProjection();
  }

  if(!data || data.error){
    fallbackTrend(data && data.error ? ('CM ' + String(data.error).substring(0,40)) : 'fetch fallito');
    return;
  }

  var listings = (data.listings || []).filter(function(l){ return l && typeof l.price === 'number'; });
  if(!listings.length){
    fallbackTrend('nessun listing');
    return;
  }

  // Normalizza il grading: se NON è già stato parsato dall'edge function
  // (es. risultati da NEXT_DATA fallback) prova a parsare il commento ora.
  // Se il commento è assente del tutto, prova a parsare grading da QUALSIASI
  // campo di testo presente sul listing (es. seller note nascosta).
  listings = listings.map(function(l){
    if(!l.grading && l.comment) l.grading = anlParseGrading(l.comment);
    // Last-resort: se ancora niente grading, prova a scansionare TUTTE le
    // proprietà testuali del listing alla ricerca di un pattern grading.
    if(!l.grading){
      for(var k in l){
        if(typeof l[k]==='string' && l[k].length>1 && l[k].length<300){
          var g = anlParseGrading(l[k]);
          if(g){ l.grading = g; if(!l.comment) l.comment = l[k]; break; }
        }
      }
    }
    return l;
  });

  var rawListings    = listings.filter(function(l){ return !l.grading; });
  var gradedListings = listings.filter(function(l){ return  l.grading; });

  // ─── Salva count/mediana raw NM/MT per BOX 3 (Strategia grading) ──
  // Permette di mostrare "compra NM e gradala" anche in mode graded, dove
  // anlLiveData.cm è sostituito col prezzo gradato.
  var rawNmListings = rawListings.filter(function(l){
    var cond = (l.condition || '').toUpperCase().replace(/[\s\-_]/g,'');
    return cond==='MINT' || cond==='MT' || cond==='NM' || cond==='NEARMINT';
  });
  if(rawNmListings.length){
    var rnPrices = rawNmListings.map(function(l){return l.price;}).sort(function(a,b){return a-b;});
    var rnMid = Math.floor(rnPrices.length/2);
    var rnMedian = rnPrices.length%2===0 ? (rnPrices[rnMid-1]+rnPrices[rnMid])/2 : rnPrices[rnMid];
    anlLiveData.cmRawNm = {
      count:  rawNmListings.length,
      median: rnMedian,
      min:    rnPrices[0],
      max:    rnPrices[rnPrices.length-1],
    };
  } else {
    anlLiveData.cmRawNm = null;
  }
  anlLiveData.cmRawAll = { count: rawListings.length };

  // ─── DIAGNOSTICA CONSOLE: vedi cosa l'edge function ha estratto ──
  try{
    console.group('%c[Analizza] CM listings — '+listings.length+' totali ('+gradedListings.length+' gradate, '+rawListings.length+' raw)','color:#06b6d4;font-weight:bold');
    console.log('Modalità: '+(graded?'GRADED ('+house+' '+score+')':'RAW'));
    console.table(listings.map(function(l, i){
      return {
        '#': i+1,
        price: '€'+l.price.toFixed(2),
        cond: l.condition || '?',
        lang: l.language || '—',
        comment: l.comment ? l.comment.substring(0,80) : '—',
        grading: l.grading ? (l.grading.house+' '+l.grading.score) : '—',
      };
    }));
    console.groupEnd();
  }catch(e){}

  // Se in graded mode E ci sono gradate, mostra SEMPRE la tabella raggruppata
  // (anche prima del calcolo finale, così l'utente vede subito cosa c'è)
  if(graded && gradedListings.length > 0){
    anlRenderCmGradeTable(gradedListings, house, score, userLang);
  } else {
    anlRenderCmGradeTable(null);
  }

  var selected, label, droppedNote = '';
  if(graded){
    // Match esatto house+score (con tolleranza ±0.5 per voti decimali).
    // ABBASSATO il minimo da 2 a 1: anche un singolo PSA 8 ITA è MOLTO più
    // accurato del trend o di una media generica — è proprio il dato cercato.
    var exact = gradedListings.filter(function(l){
      return l.grading.house === house && Math.abs(l.grading.score - score) < 0.01;
    });
    if(exact.length >= 1){
      selected = exact;
      label = 'CM '+house+' '+score;
      if(exact.length === 1){
        droppedNote = '1 listing esatto (campione minimo)';
      }
    } else {
      var sameHouse = gradedListings.filter(function(l){ return l.grading.house === house; });
      if(sameHouse.length >= 2){
        selected = sameHouse;
        label = 'CM '+house+' (grado misto)';
        droppedNote = '⚠ pochi '+house+' '+score+', uso media '+house+' generica';
      } else if(sameHouse.length === 1){
        selected = sameHouse;
        label = 'CM '+house+' (1 grado diverso)';
        droppedNote = '⚠ niente '+house+' '+score+', uso 1 listing '+house+' '+sameHouse[0].grading.score;
      } else if(gradedListings.length >= 2){
        selected = gradedListings;
        label = 'CM gradate (mix case)';
        droppedNote = '⚠ niente '+house+', uso media gradate generica';
      } else if(gradedListings.length === 1){
        selected = gradedListings;
        label = 'CM '+gradedListings[0].grading.house+' '+gradedListings[0].grading.score;
        droppedNote = '⚠ unica gradata trovata: '+gradedListings[0].grading.house+' '+gradedListings[0].grading.score;
      } else {
        // 0 gradate: fallback trend (CM raw inaffidabile per gradate)
        fallbackTrend('solo listings raw — CM inaffidabile per gradate');
        return;
      }
    }
  } else {
    // Mode RAW: escludi qualsiasi listing con grading
    if(rawListings.length >= 2){
      selected = rawListings;
      label = 'CM raw';
      if(gradedListings.length > 0){
        droppedNote = gradedListings.length+' gradate escluse';
      }
    } else {
      fallbackTrend(rawListings.length+' raw, '+gradedListings.length+' gradate — uso trend');
      return;
    }
  }

  // ─── DIAGNOSTICA: log dei listing entrati nel selected ──
  // Serve per debug rapido di disallineamenti tra la nota "X gradate" e la
  // tabella raggruppata. Permette di vedere subito se un raw è stato
  // erroneamente conteggiato come graded (ghost).
  try{
    console.group('%c[Analizza] CM selected ('+selected.length+' listings, label="'+label+'")','color:#a855f7;font-weight:bold');
    console.table(selected.map(function(l, i){
      return {
        '#': i+1,
        price: '€'+l.price.toFixed(2),
        cond: l.condition || '?',
        lang: l.language || '—',
        comment: l.comment ? l.comment.substring(0,60) : '—',
        grading: l.grading ? (l.grading.house+' '+l.grading.score) : '—',
      };
    }));
    if(droppedNote) console.log('Note: '+droppedNote);
    console.groupEnd();
  }catch(e){}

  // Calcola mediana sui prezzi selezionati
  var prices = selected.map(function(l){ return l.price; }).sort(function(a,b){ return a-b; });
  var mid = Math.floor(prices.length/2);
  var median = prices.length%2===0 ? (prices[mid-1]+prices[mid])/2 : prices[mid];
  var min = prices[0], max = prices[prices.length-1];

  // Aggiorna anlLiveData.cm con il valore filtrato (sostituisce il trend TCG)
  // Per raw applichiamo condition factor (la mediana CM è in NM Italian per default)
  if(graded){
    anlLiveData.cm = Math.round(median*100)/100;
  } else {
    var cf = ANL_COND_FACTOR[document.getElementById('anlCond').value]||1.0;
    var ef = document.getElementById('anl1st').value==='yes' ? ANL_FIRST_ED_MULT : 1.0;
    anlLiveData.cm = Math.round(median*cf*ef*100)/100;
  }

  // Confidence dal sample
  var conf = prices.length>=10 ? 'high' : (prices.length>=5 ? 'medium' : (prices.length>=3 ? 'low' : 'very-low'));

  if(priceEl){
    priceEl.textContent = '€'+median.toFixed(2);
    priceEl.classList.remove('loading','na');
    // Se siamo in graded e abbiamo dati reali, rimuovi la classe dim dal wrapper
    var wrapper = priceEl.closest('.anl-src');
    if(wrapper) wrapper.classList.remove('anl-src-dim');
  }
  if(noteEl){
    var noteParts = [prices.length+' '+(graded?'gradate':'raw')];
    if(min !== max) noteParts.push('€'+Math.round(min)+'–€'+Math.round(max));

    // Aggiunge breakdown lingua tra i listing usati per la mediana, ma solo
    // se ci sono lingue note (almeno una). Aiuta a capire se €350 è una PSA8
    // ITA (premium) o EN (sconto).
    var langs = {};
    selected.forEach(function(l){ if(l.language){ langs[l.language] = (langs[l.language]||0)+1; } });
    var langKeys = Object.keys(langs);
    if(langKeys.length === 1){
      // Tutti la stessa lingua
      noteParts.push(langKeys[0]);
    } else if(langKeys.length > 1){
      // Mix lingue: mostra ordinato per count desc
      var langStr = langKeys.sort(function(a,b){return langs[b]-langs[a];})
        .map(function(k){return k+':'+langs[k];}).join('/');
      noteParts.push(langStr);
    }
    // Se l'utente ha selezionato una lingua e nessuno dei selected matcha → warning
    if(graded && userLang && langKeys.length>0 && !langs[userLang]){
      noteParts.push('⚠ niente '+userLang);
    }

    if(droppedNote) noteParts.push(droppedNote);
    noteEl.textContent = noteParts.join(' · ');
  }
  anlSetDot('anlSrcCmDot', conf);

  anlRenderToday();
  anlRenderProjection();
}

function anlPopEbay(data, err){
  var priceEl=document.getElementById('anlSrcEb');
  var noteEl=document.getElementById('anlSrcEbNote');
  if(err || !data || (!data.count && !(data.items && data.items.length))){
    if(priceEl){ priceEl.textContent='—'; priceEl.classList.remove('loading'); priceEl.classList.add('na'); }
    if(noteEl){
      // Mostra diag riassuntivo inline (visibile senza DevTools)
      var diagSummary = '';
      if(data && data._diag && Array.isArray(data._diag) && data._diag.length){
        var firstD = data._diag[0] && data._diag[0].diag;
        if(firstD){
          var flags = [];
          if(firstD.has_cf_challenge)        flags.push('CF');
          if(firstD.has_captcha)             flags.push('captcha');
          if(firstD.has_signin_redirect)     flags.push('signin');
          if(firstD.has_pardon_interruption) flags.push('pardon');
          if(firstD.has_no_results)          flags.push('no_res');
          if(firstD.itm_link_count > 0 && !flags.length) flags.push(firstD.itm_link_count+' link nessun price');
          if(flags.length) diagSummary = ' · ['+flags.join('/')+']';
        }
      }
      noteEl.textContent = (err ? ('errore: '+String(err).substring(0,60)) : 'nessun venduto trovato')+diagSummary;
    }
    anlSetDot('anlSrcEbDot', 'none');
    anlRenderEbGradeTable(null);
    // ─── DIAGNOSTICA CONSOLE ──
    // Quando l'edge function fallisce a trovare venduti, l'edge ritorna _diag
    // con info su cosa ha effettivamente ricevuto. Logghiamo tutto per debug.
    try{
      console.group('%c[Analizza] eBay sold — nessun venduto', 'color:#f59e0b;font-weight:bold');
      if(err) console.warn('Messaggio errore:', err);
      if(data){
        console.log('attempts (per URL):', data.attempts);
        console.log('per_query:', data.per_query);
        if(data._diag && Array.isArray(data._diag)){
          console.warn('Diagnostica per URL (cosa ha ricevuto l\'edge function):');
          data._diag.forEach(function(d, i){
            var diag = d.diag || {};
            // Stampa inline tutti i campi rilevanti — niente Object refs da espandere
            var summary = [
              'len='+(diag.html_length||'?'),
              'title="'+(diag.page_title||'').substring(0,60)+'"',
              'cf='+(diag.has_cf_challenge?'Y':'n'),
              'captcha='+(diag.has_captcha?'Y':'n'),
              'no_results='+(diag.has_no_results?'Y':'n'),
              'signin='+(diag.has_signin_redirect?'Y':'n'),
              'pardon='+(diag.has_pardon_interruption?'Y':'n'),
              'srp='+(diag.has_srp_results_marker?'Y':'n'),
              'itm_links='+(diag.itm_link_count||0),
            ].join(' · ');
            console.log('%cURL #'+(i+1)+'%c '+summary, 'color:#06b6d4;font-weight:bold', 'color:#9ca3af');
            console.log('  URL:', d.url);
            if(diag.head_sample) console.log('  head_sample (first 800ch):', diag.head_sample);
            if(diag.http_error) console.warn('  HTTP error:', diag.http_error);
          });
        }
        console.log('full response:', data);
      }
      console.groupEnd();
    }catch(e){console.warn('diag log error', e);}
    anlRenderToday();
    anlRenderProjection();
    return;
  }

  // Applica normalizzazione CM-anchored + MAD + filtri raw/graded sui titoli (se items presenti)
  var rate = anlLiveData.usdEur || ANL_USD_EUR_FALLBACK;
  var graded = anlMode==='graded';
  var cmRef = anlLiveData.cm || null;
  var userLang = document.getElementById('anlLang').value;
  var sane = anlSanitizeEbay(data, cmRef, rate, graded, userLang);

  // Caso: dopo il filtro modalità (graded/raw) non rimangono campioni utili
  if(!sane.countEur || sane.countEur===0){
    if(priceEl){ priceEl.textContent='—'; priceEl.classList.remove('loading'); priceEl.classList.add('na'); }
    if(noteEl){
      var dropMsg = graded
        ? (data.items&&data.items.length
            ? data.items.length+' venduti trovati ma nessuno gradato nel titolo'
            : 'nessun venduto gradato')
        : (data.items&&data.items.length
            ? data.items.length+' venduti trovati ma tutti gradati (cerco raw)'
            : 'nessun venduto raw');
      noteEl.textContent = dropMsg;
    }
    anlSetDot('anlSrcEbDot', 'none');
    anlRenderEbGradeTable(null);
    anlLiveData.ebay = null;
    anlRenderToday();
    anlRenderProjection();
    return;
  }

  anlLiveData.ebay = Object.assign({}, data, {
    median: sane.medianEur,
    avg: sane.avgEur,
    min: sane.minEur,
    max: sane.maxEur,
    count: sane.countEur,
    currency: 'EUR',
    prices: sane.pricesEur,
    _originalCurrency: data.currency,
    _originalCount: data.count,
    _filteredOut: sane.filteredOut,
    _cmAnchor: sane.cmAnchor,
    _langStats: sane.langStats,
    _rawCount: sane.rawCount,
    _gradedCount: sane.gradedCount,
    _modeFilterDropped: data._modeFilterDropped,
    _modeFilterAborted: data._modeFilterAborted,
  });

  if(priceEl){
    priceEl.textContent = '€'+sane.medianEur.toFixed(2);
    priceEl.classList.remove('loading');
    priceEl.classList.remove('na');
  }

  if(noteEl){
    var parts = [sane.countEur+' venduti'];
    parts.push('€'+Math.round(sane.minEur)+'–€'+Math.round(sane.maxEur));
    // Indica se abbiamo filtrato per modalità (es. "raw esclusi" / "graded esclusi")
    if(data._modeFilterDropped > 0){
      parts.push((graded?'-':'-')+data._modeFilterDropped+(graded?' raw':' graded'));
    }
    // Outlier statistici scartati
    if(sane.filteredOut > 0){
      parts.push(sane.filteredOut+' outlier');
    }
    // Mercato originale se misto/non-EUR
    if(data.currency && data.currency!=='EUR'){
      parts.push(data.currency==='USD'?'US':'UK');
    }
    noteEl.textContent = parts.join(' · ');

    // ─── Warning lingua: se l'utente ha selezionato una lingua e i venduti rilevati
    //     sono predominantemente in un'altra lingua, mostra alert sotto la note.
    if(sane.langStats){
      var ls = sane.langStats;
      var explicitTotal = ls.ITA+ls.ENG+ls.JPN+ls.DEU+ls.FRA+ls.ESP+ls.POR+ls.KOR+ls.CHI;
      // Lingua dominante (se >=40% degli explicit) — usata per warning
      var dominant = null, dominantCount = 0;
      ['ITA','ENG','JPN','DEU','FRA','ESP','POR','KOR','CHI'].forEach(function(l){
        if(ls[l] > dominantCount){ dominantCount = ls[l]; dominant = l; }
      });
      var warnHtml = null;
      if(userLang && explicitTotal >= 3){
        if(dominant && dominant !== userLang && dominantCount >= explicitTotal*0.4){
          warnHtml = '⚠ titoli prevalenti in <b>'+dominant+'</b> ('+dominantCount+'/'+explicitTotal+'), hai selezionato '+userLang+' — i prezzi possono essere falsati';
        } else if(userLang!=='ENG' && ls[userLang]===0 && ls.ENG>0){
          warnHtml = '⚠ nessun venduto esplicitamente <b>'+userLang+'</b>; '+ls.ENG+' titoli ENG rilevati';
        }
      }
      // Mostra/nascondi un secondo span sotto noteEl per il warning
      var warnEl = document.getElementById('anlSrcEbWarn');
      if(!warnEl){
        warnEl = document.createElement('div');
        warnEl.id = 'anlSrcEbWarn';
        warnEl.style.cssText = 'font-size:10px;color:var(--warning);margin-top:3px;line-height:1.3';
        if(noteEl.parentNode) noteEl.parentNode.insertBefore(warnEl, noteEl.nextSibling);
      }
      warnEl.innerHTML = warnHtml || '';
      warnEl.style.display = warnHtml ? 'block' : 'none';
    }
  }

  anlSetDot('anlSrcEbDot', sane.confidenceLevel);

  // Tabella raggruppata in graded mode (analoga a CM): mostra distribuzione
  // dei sold per (house, score, lingua). Filteredata.items è già normalizzata
  // con _grading e _lang da anlSanitizeEbay.
  if(anlMode==='graded'){
    var graded_house = document.getElementById('anlHouse').value;
    var graded_score = parseFloat(document.getElementById('anlGradeScore').value);
    var graded_userLang = document.getElementById('anlLang') ? document.getElementById('anlLang').value : null;
    // Items con _grading e _lang sono prodotti dal sanitize quando data.items
    // è presente. Usa l'array filtrato (post mode-filter) se disponibile.
    var itemsForTable = (data.items || []).map(function(it){
      // Re-parse per sicurezza: alcuni item potrebbero non avere _grading se
      // sono passati direttamente dall'edge senza passare dal sanitize-filter
      if(!it._grading){
        it._grading = anlParseGrading(it.title);
        it._lang = anlDetectLang(it.title);
      }
      return it;
    });
    anlRenderEbGradeTable(itemsForTable, graded_house, graded_score, graded_userLang);
  } else {
    anlRenderEbGradeTable(null);
  }

  anlRenderToday();
  anlRenderProjection();
}

// Parse risultati eBay LIVE (asks/inserzioni attive)
// Salva mediano in anlLiveData.ebayActive per uso in BOX 3 (Interesse mercato).
// Riusa anlSanitizeEbay per filtri raw/graded/lang sui titoli.
function anlPopEbayActive(data, err){
  if(err || !data || (!data.count && !(data.items && data.items.length))){
    anlLiveData.ebayActive = null;
    anlRenderProjection();
    return;
  }
  var rate = anlLiveData.usdEur || ANL_USD_EUR_FALLBACK;
  var graded = anlMode==='graded';
  var cmRef = anlLiveData.cm || null;
  var userLang = document.getElementById('anlLang').value;
  var sane = anlSanitizeEbay(data, cmRef, rate, graded, userLang);

  if(!sane.countEur || sane.countEur===0){
    anlLiveData.ebayActive = null;
  } else {
    anlLiveData.ebayActive = {
      median: sane.medianEur,
      count:  sane.countEur,
      currency: 'EUR',
      min:    sane.minEur,
      max:    sane.maxEur,
    };
  }
  anlRenderProjection();
}

function anlPopPc(prices, err){
  var priceEl=document.getElementById('anlSrcPc');
  var noteEl=document.getElementById('anlSrcPcNote');
  var linkEl=document.getElementById('anlSrcPcLink');

  // Aggiorna link al prodotto specifico (se abbiamo risolto l'URL)
  if(linkEl && anlLiveData.pcProductUrl){
    linkEl.href = anlLiveData.pcProductUrl;
    linkEl.textContent = 'apri prodotto →';
  }

  if(err || !prices){
    if(priceEl){ priceEl.textContent='—'; priceEl.classList.remove('loading'); priceEl.classList.add('na'); }
    if(noteEl){ noteEl.textContent = err ? ('errore: '+String(err).substring(0,60)) : 'nessun dato'; }
    anlSetDot('anlSrcPcDot','none');
    anlRenderPcGradeTable(null);
    anlRenderToday();
    anlRenderProjection();
    return;
  }
  var rate = anlLiveData.usdEur || ANL_USD_EUR_FALLBACK;
  var graded = anlMode==='graded';
  var eurValue=null, srcLabel='', sourceNote='', confLevel='none', sampleCount=null;

  if(graded){
    var house = document.getElementById('anlHouse').value;
    var score = document.getElementById('anlGradeScore').value;
    var listingKey = house + '_' + score;

    // Prefer: sold listings specifici
    if(prices.grades_from_listings && prices.grades_from_listings[listingKey]){
      var L = prices.grades_from_listings[listingKey];
      if(L.currency_symbol==='€')      eurValue = L.median;
      else if(L.currency_symbol==='£') eurValue = L.median * 1.17 * rate;
      else                             eurValue = L.median * rate;
      srcLabel = house+' '+score;
      sampleCount = L.count || 0;
      confLevel = sampleCount>=10 ? 'high' : (sampleCount>=5 ? 'medium' : (sampleCount>=3 ? 'low' : 'very-low'));
      var rangeStr = (L.min!=null && L.max!=null)
        ? ' · €'+Math.round((L.currency_symbol==='€'?L.min:(L.currency_symbol==='£'?L.min*1.17*rate:L.min*rate)))+'–€'+Math.round((L.currency_symbol==='€'?L.max:(L.currency_symbol==='£'?L.max*1.17*rate:L.max*rate)))
        : '';
      sourceNote = sampleCount+' vendite'+rangeStr;
    } else {
      // Fallback: campi aggregati (rispetta currency nativa PC)
      var key = anlPcKey(house, parseFloat(score));
      var rawVal = key ? prices[key] : null;
      if(rawVal!=null){
        var pcCur2 = prices.currency || 'USD';
        if(pcCur2==='EUR')      eurValue = rawVal;
        else if(pcCur2==='GBP') eurValue = rawVal * 1.17 * rate;
        else                    eurValue = rawVal * rate;
        srcLabel = 'stima '+house+' '+score;
        sourceNote = 'aggregato PC';
        confLevel = 'medium';
      }
    }
  } else {
    if(prices.ungraded!=null){
      var pcCur3 = prices.currency || 'USD';
      if(pcCur3==='EUR')      eurValue = prices.ungraded;
      else if(pcCur3==='GBP') eurValue = prices.ungraded * 1.17 * rate;
      else                    eurValue = prices.ungraded * rate;
      srcLabel = 'ungraded';
      confLevel = 'high'; // dato aggregato PC — generalmente affidabile
    }
  }

  // Salva valore base prezzo (senza spese) per uso nella tabella e nel calcolo media.
  // Vista PC source mostra valore +spese (costo reale per acquistare USA→IT).
  var eurValueBase = eurValue;
  var eurValueWithFees = eurValue != null ? anlImportTotal(eurValue) : null;
  // anlLiveData.pc rimane il prezzo base; la media usa il prezzo +spese (vedi anlComputeToday)
  if(eurValue != null){
    anlLiveData.pcWithFees = eurValueWithFees;
  }

  if(priceEl){
    if(eurValueWithFees!=null){
      priceEl.textContent='€'+eurValueWithFees.toFixed(2);
      priceEl.classList.remove('loading');
      priceEl.classList.remove('na');
    } else {
      priceEl.textContent='—';
      priceEl.classList.remove('loading');
      priceEl.classList.add('na');
      confLevel = 'none';
    }
  }
  if(noteEl){
    var parts=[];
    if(srcLabel) parts.push(srcLabel);
    if(sourceNote) parts.push(sourceNote);
    // Mostra prezzo base (senza spese) come riferimento
    if(eurValueBase != null){
      parts.push('netto €'+eurValueBase.toFixed(2));
    }
    // PC = sold eBay US/UK aggregati, sempre lingua inglese.
    parts.push('ENG');
    // Trend 12M (solo il più rilevante per il tipo selezionato)
    if(!graded && prices.trend_ungraded_12m!=null){
      parts.push('12M '+(prices.trend_ungraded_12m>=0?'+':'')+prices.trend_ungraded_12m.toFixed(1)+'%');
    } else if(graded && prices.trend_psa10_12m!=null){
      parts.push('PSA10 12M '+(prices.trend_psa10_12m>=0?'+':'')+prices.trend_psa10_12m.toFixed(1)+'%');
    } else if(graded && prices.trend_grade9_12m!=null){
      parts.push('G9 12M '+(prices.trend_grade9_12m>=0?'+':'')+prices.trend_grade9_12m.toFixed(1)+'%');
    }
    noteEl.textContent = parts.join(' · ');

    // ─── Warning 1st Edition / Unlimited mismatch + info titolo prodotto ──
    // Wrappato in try/catch difensivo: se per qualunque ragione il DOM ha
    // uno stato inatteso (cache stale, race condition, etc), non vogliamo
    // che un'eccezione qui rompa il rendering del resto della pagina.
    try {
      var warnEl = document.getElementById('anlSrcPcWarn');
      if(!warnEl){
        warnEl = document.createElement('div');
        warnEl.id = 'anlSrcPcWarn';
        warnEl.style.cssText = 'font-size:10px;color:var(--warning);margin-top:3px;line-height:1.3';
        // Inserisci dopo noteEl. Se parentNode null o nextSibling null, appendChild safe fallback.
        if(noteEl && noteEl.parentNode){
          if(noteEl.nextSibling){
            noteEl.parentNode.insertBefore(warnEl, noteEl.nextSibling);
          } else {
            noteEl.parentNode.appendChild(warnEl);
          }
        }
      }
      var ptitle = (anlLiveData.pcProductTitle || prices.productTitle || '').toLowerCase();
      var pUrl   = (anlLiveData.pcProductUrl || '').toLowerCase();
      var ptxt   = ptitle + ' ' + pUrl;
      var has1st = /1st[-\s]edition|first[-\s]edition/.test(ptxt);
      var hasShadowless = /shadowless/.test(ptxt);
      var hasUnlimited  = /unlimited/.test(ptxt);
      var userWants1st = (anlMode==='raw' && document.getElementById('anl1st') && document.getElementById('anl1st').value==='yes');
      var warnHtml = null;
      var isWarning = false;
      if(userWants1st && !has1st && (hasUnlimited || hasShadowless)){
        var variant = hasShadowless ? 'Shadowless' : 'Unlimited';
        warnHtml = '⚠ Hai indicato <b>1ª Edizione</b> ma PC ha risolto la variante <b>'+variant+'</b>. Prezzo potrebbe non corrispondere.';
        isWarning = true;
      } else if(!userWants1st && has1st){
        warnHtml = '⚠ PC ha risolto la variante <b>1ª Edizione</b> mentre tu cerchi la versione standard. Prezzo potrebbe essere alto.';
        isWarning = true;
      } else if(ptitle){
        warnHtml = '<span style="opacity:0.7">prodotto:</span> '+anlEsc(prices.productTitle || anlLiveData.pcProductTitle || '');
      }
      if(warnEl){
        warnEl.style.cssText = isWarning
          ? 'font-size:10px;color:var(--warning);margin-top:3px;line-height:1.3'
          : 'font-size:10px;color:var(--text-subtle);margin-top:3px;line-height:1.3;font-family:var(--mono)';
        warnEl.innerHTML = warnHtml || '';
        warnEl.style.display = warnHtml ? 'block' : 'none';
      }
    } catch(e){
      console.warn('[Analizza] PC warning render failed:', e.message);
    }
  }
  anlSetDot('anlSrcPcDot', confLevel);

  // Tabella PC: mostra TUTTI i grade disponibili (sold listings reali +
  // aggregati). Aiuta a vedere il pricing complessivo e fare confronti
  // (es. "PSA 9 €X vs PSA 10 €Y" per stimare il delta atteso al ri-grading).
  if(graded){
    var pc_house = document.getElementById('anlHouse').value;
    var pc_score = parseFloat(document.getElementById('anlGradeScore').value);
    anlRenderPcGradeTable(prices, pc_house, pc_score);
  } else {
    anlRenderPcGradeTable(null);
  }

  anlRenderToday();
  anlRenderProjection();
}


</script>

<script>


// ── rbParentFn: helper per accedere a funzioni del parent (pokemon-db.html)
//    Quando il frame gira in iframe, ritorna window.parent[name].
//    In standalone, ritorna window[name]. Safe su cross-origin.
function rbParentFn(name){
  try {
    var w = (window.parent && window.parent !== window) ? window.parent : window;
    return w[name] || null;
  } catch(_){ return null; }
}

// Bootstrap del frame
document.addEventListener("DOMContentLoaded", function(){
  // Mount setpicker (richiede rbMountSetPicker dal parent)
  try {
    var mountFn = rbParentFn('rbMountSetPicker');
    if(mountFn){
      mountFn({
        containerId: 'anlCardName-setpicker',
        inputId:     'anlCardName-setpicker-input',
        placeholder: 'Scegli set'
      });
    }
  } catch(e){ console.warn('[anl] mount setpicker:', e && e.message); }

  if(typeof window.anlInitTab === 'function'){
    try{ window.anlInitTab(); }catch(e){ console.error("[anl frame]", e); }
  }
});
</script>
