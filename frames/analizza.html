// Mantengo le vecchie funzioni per evitare break su chiamate esterne (no-op delegano a anlRenderProjection)
function anlRenderProjectionGraded(priceEl, deltaEl, descEl, gridEl){
  var today = anlComputeToday();
  var pc = anlLiveData.pc;
  var ebay = anlLiveData.ebay;
  var house = document.getElementById('anlHouse').value;
  var score = document.getElementById('anlGradeScore').value;
  var listingKey = house + '_' + score;

  if(!today.price){
    priceEl.textContent='—'; priceEl.className='anl-fwd-price mute';
    deltaEl.textContent=''; deltaEl.className='anl-fwd-delta mute';
    descEl.textContent='Serve almeno una sorgente valida per analizzare il mercato.';
    gridEl.innerHTML='';
    return;
  }

  // Per le carte gradate, PC non espone trend 12M nella pagina base.
  // Invece di mostrare una previsione inventata, analizziamo il mercato REALE:
  // - volumi: quante vendite eBay nel campione di PC + nella cascata eBay Sold
  // - dispersione: range min-max come indicatore di liquidità/volatilità del prezzo
  // - rarità: count totale di vendite (alto = carta liquida, basso = carta illiquida)
  var rate = anlLiveData.usdEur || ANL_USD_EUR_FALLBACK;
  var pcListing = (pc && pc.grades_from_listings) ? pc.grades_from_listings[listingKey] : null;

  // Totale vendite storiche (PC) + vendite recenti (eBay cascata)
  var pcCount = pcListing ? pcListing.count : 0;
  var ebayCount = ebay && ebay.count ? ebay.count : 0;
  var totalSales = pcCount + ebayCount;

  // Volatilità: (max - min) / mediana. Se >0.8 il mercato è molto volatile.
  var volatility = null;
  if(pcListing && pcListing.max && pcListing.min && pcListing.median){
    volatility = (pcListing.max - pcListing.min) / pcListing.median;
  }

  // Classificazione liquidità
  var liquidity;
  if(totalSales >= 20)       liquidity = {label:'alta', cls:'pos', note:'carta molto scambiata, prezzo affidabile'};
  else if(totalSales >= 8)   liquidity = {label:'media', cls:'mute', note:'mercato attivo ma non sovrabbondante'};
  else if(totalSales >= 3)   liquidity = {label:'bassa', cls:'mute', note:'poche vendite registrate, prezzo indicativo'};
  else                       liquidity = {label:'molto bassa', cls:'neg', note:'carta illiquida, difficile valutare'};

  // Classificazione volatilità
  var volatilityClass = null;
  if(volatility != null){
    if(volatility < 0.3)      volatilityClass = {label:'bassa', cls:'pos', note:'prezzi stabili, mercato maturo'};
    else if(volatility < 0.6) volatilityClass = {label:'media', cls:'mute', note:'escursioni normali'};
    else if(volatility < 1.2) volatilityClass = {label:'alta', cls:'mute', note:'prezzo variabile tra vendite'};
    else                      volatilityClass = {label:'molto alta', cls:'neg', note:'attenzione: range prezzi molto ampio'};
  }

  // Hero: prezzo corrente (già calcolato in anlComputeToday)
  priceEl.textContent = '€'+today.price.toFixed(2);
  priceEl.className = 'anl-fwd-price';
  deltaEl.textContent = 'mercato ' + liquidity.label;
  deltaEl.className = 'anl-fwd-delta ' + liquidity.cls;

  // Descrizione
  var descParts = ['Valore di mercato attuale per '+house+' '+score+': €'+today.price.toFixed(2)+'.'];
  if(totalSales > 0){
    descParts.push(totalSales+' vendite analizzate (PC Sold Listings + eBay cascata).');
  }
  descParts.push('Liquidità '+liquidity.label+' · '+liquidity.note+'.');
  if(volatilityClass){
    descParts.push('Volatilità '+volatilityClass.label+' · '+volatilityClass.note+'.');
  }
  descEl.textContent = descParts.join(' ');

  // Grid KV con dettagli di mercato
  var rows=[
    {k:'Valore mediano', v:'€'+today.price.toFixed(2)},
    {k:'Vendite totali', v: totalSales>0 ? (totalSales + ' (' + pcCount + ' storiche + ' + ebayCount + ' recenti)') : '—', cls:'mute'},
  ];
  if(pcListing){
    var sym = pcListing.currency_symbol || '$';
    rows.push({k:'Range prezzi', v: sym+Math.round(pcListing.min)+'–'+sym+Math.round(pcListing.max), cls:'mute'});
  }
  rows.push({k:'Liquidità', v:liquidity.label, cls:liquidity.cls});
  if(volatilityClass){
    rows.push({k:'Volatilità', v:volatilityClass.label + (volatility!=null?' ('+(volatility*100).toFixed(0)+'%)':''), cls:volatilityClass.cls});
  }
  // Suggerimento operativo
  var advice = null;
  if(liquidity.label==='alta' && volatilityClass && volatilityClass.label==='bassa'){
    advice = {k:'Consiglio', v:'Mercato solido, prezzo affidabile', cls:'pos'};
  } else if(liquidity.label==='molto bassa'){
    advice = {k:'Consiglio', v:'Prezzo solo indicativo, negozia', cls:'neg'};
  } else if(volatilityClass && volatilityClass.label==='molto alta'){
    advice = {k:'Consiglio', v:'Aspetta o verifica su più fonti', cls:'neg'};
  }
  if(advice) rows.push(advice);

  gridEl.innerHTML = rows.map(function(r){
    return '<div class="anl-fwd-kv"><span class="anl-fwd-kv-k">'+r.k+'</span><span class="anl-fwd-kv-v '+(r.cls||'')+'">'+r.v+'</span></div>';
  }).join('');
}

function anlRenderProjectionRaw(priceEl, deltaEl, descEl, gridEl){
  var cond = document.getElementById('anlCond').value;
  var expGrade = ANL_EXPECTED_GRADE[cond];
  var ebay = anlLiveData.ebay;
  var pc   = anlLiveData.pc;
  var rate = anlLiveData.usdEur || ANL_USD_EUR_FALLBACK;
  var today = anlComputeToday();

  if(expGrade==null){
    priceEl.textContent='—'; priceEl.className='anl-fwd-price mute';
    deltaEl.textContent=''; deltaEl.className='anl-fwd-delta mute';
    descEl.textContent='Condizione non gradabile.';
    gridEl.innerHTML='';
    return;
  }

  // Valore target: PSA (house più liquida per PC). Priorità listings specifici PSA+expGrade.
  var pcGradedEur = null;
  var listingKey = 'PSA_' + expGrade;
  if(pc && pc.grades_from_listings && pc.grades_from_listings[listingKey]){
    var L = pc.grades_from_listings[listingKey];
    if(L.currency_symbol==='€')      pcGradedEur = L.median;
    else if(L.currency_symbol==='£') pcGradedEur = L.median * 1.17 * rate;
    else                             pcGradedEur = L.median * rate;
  } else {
    // Fallback campi aggregati con currency-aware conversion
    var pcKey = anlPcKey('PSA', expGrade);
    var pcGraded = pc && pcKey ? pc[pcKey] : null;
    if(pcGraded!=null){
      var pcCur = (pc && pc.currency) || 'USD';
      if(pcCur==='EUR')      pcGradedEur = pcGraded;
      else if(pcCur==='GBP') pcGradedEur = pcGraded * 1.17 * rate;
      else                   pcGradedEur = pcGraded * rate;
    }
  }

  // Se eBay ha un sotto-dataset graded, sarebbe ideale — al momento l'edge non separa raw/graded
  // Usa PC come fonte primaria per il valore potenziale graded
  if(pcGradedEur==null){
    priceEl.textContent='—'; priceEl.className='anl-fwd-price mute';
    deltaEl.textContent=''; deltaEl.className='anl-fwd-delta mute';
    descEl.textContent='Non ci sono dati PriceCharting per stimare il valore in grado '+expGrade+'. Prova con eBay manualmente.';
    gridEl.innerHTML='';
    return;
  }

  // Trovato pcGradedEur — arricchiamo con metadati del listing source
  var listingData = (pc && pc.grades_from_listings) ? pc.grades_from_listings[listingKey] : null;
  var listingCount = listingData ? listingData.count : null;
  var listingConfidence = listingData ? listingData.confidence : null;

  var delta = today.price ? pcGradedEur - today.price : null;
  var cls = delta==null ? 'mute' : (delta>=0 ? 'pos' : 'neg');

  // Stima costo grading PSA (regular tier) + shipping a/r
  // PSA "Value" tier ~$25 (carte sotto $499), "Regular" ~$75 (sotto $1499), "Express" ~$150+
  // In EUR includendo spedizione a/r dall'Italia: ~€35 value, ~€95 regular
  var gradingCost;
  if(pcGradedEur < 500)        gradingCost = 35;
  else if(pcGradedEur < 1500)  gradingCost = 95;
  else if(pcGradedEur < 5000)  gradingCost = 180;
  else                         gradingCost = 280;

  var netUpside = delta != null ? delta - gradingCost : null;
  var netCls = netUpside==null ? 'mute' : (netUpside>=0 ? 'pos' : 'neg');

  priceEl.textContent='€'+pcGradedEur.toFixed(2);
  priceEl.className='anl-fwd-price '+cls;
  deltaEl.textContent = delta!=null ? (delta>=0?'+':'')+'€'+delta.toFixed(2)+' vs raw' : '';
  deltaEl.className='anl-fwd-delta '+cls;

  var descParts=[
    'Condizione '+cond+' → grado atteso PSA '+expGrade+'.',
  ];
  if(listingData){
    var confTxt = listingConfidence==='high' ? '' : (listingConfidence==='medium' ? ' (campione medio)' : ' (campione piccolo)');
    descParts.push('Valore di mercato PSA '+expGrade+': €'+pcGradedEur.toFixed(2)+' (mediana su '+listingCount+' vendite eBay reali'+confTxt+').');
  } else {
    descParts.push('Valore di mercato PSA '+expGrade+' (stima PriceCharting): €'+pcGradedEur.toFixed(2)+'.');
  }
  if(today.price && netUpside!=null){
    var verdict = netUpside > 20 ? 'Gradare conviene' : (netUpside > -20 ? 'Economicamente in pari' : 'Gradare non conviene');
    descParts.push(verdict + ': upside netto ' + (netUpside>=0?'+':'') + '€' + netUpside.toFixed(2) + ' (dopo ~€' + gradingCost + ' di grading + spedizione).');
  }
  descEl.textContent = descParts.join(' ');

  var rows=[
    {k:'Grado atteso', v:'PSA '+expGrade},
    {k:'Valore raw oggi', v: today.price ? '€'+today.price.toFixed(2) : '—', cls:'mute'},
    {k:'Valore graded PSA '+expGrade, v:'€'+pcGradedEur.toFixed(2), cls:'pos'},
  ];
  if(listingCount) rows.push({k:'Fonte dato graded', v: listingCount+' vendite eBay' + (listingConfidence==='low'?' (campione piccolo)':''), cls:'mute'});
  if(delta!=null)     rows.push({k:'Upside lordo', v:(delta>=0?'+':'')+'€'+delta.toFixed(2), cls:cls});
  if(gradingCost)     rows.push({k:'Costo grading stimato', v:'-€'+gradingCost, cls:'mute'});
  if(netUpside!=null) rows.push({k:'Upside netto', v:(netUpside>=0?'+':'')+'€'+netUpside.toFixed(2), cls:netCls});
  if(pc && pc.trend_grade9_12m!=null) rows.push({k:'Trend 12M grade 9', v:(pc.trend_grade9_12m>=0?'+':'')+pc.trend_grade9_12m.toFixed(1)+'%', cls: pc.trend_grade9_12m>=0?'pos':'neg'});

  gridEl.innerHTML = rows.map(function(r){
    return '<div class="anl-fwd-kv"><span class="anl-fwd-kv-k">'+r.k+'</span><span class="anl-fwd-kv-v '+(r.cls||'')+'">'+r.v+'</span></div>';
  }).join('');
}

// ─── LIVE FETCH ──────────────────────────────────────────────────────────────
async function anlGetUsdEur(){
  if(window._anlUsdEur) return window._anlUsdEur;
  try{
    var cached=sessionStorage.getItem('anl_usd_eur');
    var cachedT=sessionStorage.getItem('anl_usd_eur_t');
    if(cached&&cachedT&&Date.now()-parseInt(cachedT)<3600000){
      window._anlUsdEur=parseFloat(cached);
      return window._anlUsdEur;
    }
  }catch(e){}
  // Cascade di sorgenti — alcune potrebbero bloccare CORS in certi momenti.
  // Ordine: fonti CORS-friendly per primo, poi frankfurter come ultima chance.
  var sources = [
    {url:'https://open.er-api.com/v6/latest/USD', extract:function(d){ return d&&d.rates&&d.rates.EUR; }},
    {url:'https://api.exchangerate-api.com/v4/latest/USD', extract:function(d){ return d&&d.rates&&d.rates.EUR; }},
    {url:'https://api.frankfurter.app/latest?from=USD&to=EUR', extract:function(d){ return d&&d.rates&&d.rates.EUR; }},
  ];
  for(var i=0;i<sources.length;i++){
    try{
      var r=await fetch(sources[i].url);
      if(!r.ok) continue;
      var d=await r.json();
      var rate=sources[i].extract(d);
      if(rate && typeof rate==='number' && rate>0.5 && rate<2){
        window._anlUsdEur=rate;
        try{
          sessionStorage.setItem('anl_usd_eur',String(rate));
          sessionStorage.setItem('anl_usd_eur_t',String(Date.now()));
        }catch(e){}
        return rate;
      }
    }catch(e){
      // CORS, network error, ecc — prova prossima sorgente
    }
  }
  window._anlUsdEur=ANL_USD_EUR_FALLBACK;
  return window._anlUsdEur;
}

async function anlFetchSmooth(body){
  // ─── Pre-fetch HTML via estensione RareBlock Hunter (v2.5+) ──────────
  // Se l'utente ha l'extension installata, fa fetch HTML lato browser
  // (cookie + IP residenziale) e lo passa nel body. L'edge function
  // skippa proxy/ScrapingBee. Su eBay è l'unico modo per ottenere dati.
  // Su CM evita di consumare crediti proxy.
  // Fallback automatico se extension assente o fetch fallito.
  //
  // PROTOCOLLO COOPERATIVO A 2 ROUND (fix PriceCharting):
  // il pre-fetch copre solo gli URL noti in anticipo (body.urls). Gli URL
  // DERIVATI dal server (pagina prodotto PC risolta dalla search,
  // /recent-sales) venivano fetchati dal datacenter Supabase → blocco.
  // Round 1: inviamo ext:true; se un fetch derivato fallisce il server
  // risponde { retry_with_ext:true, need_fetch:[urls] }. Round 2: scarichiamo
  // quegli URL via Hunter e richiamiamo con extra_html:{url:html} (e ext:false
  // per impedire un terzo round). Massimo 1 retry, sempre fail-safe.
  var extFetch = null, extReady = false;
  try {
    extFetch = (window.parent && window.parent.rbExtFetch) || window.rbExtFetch;
    if (typeof extFetch === 'function' && Array.isArray(body.urls) && body.urls.length){
      extReady = await extFetch.isReady();
      if (extReady){
        var fetched = await Promise.all(body.urls.map(function(u){
          return extFetch(u).catch(function(){ return null; });
        }));
        // Tutte le fetch riuscite con HTML valido?
        var allOk = fetched.every(function(f){ return f && f.ok && f.html && f.html.length > 500; });
        if (allOk){
          body = Object.assign({}, body, { provided_html: fetched.map(function(f){ return f.html; }) });
          console.log('[anlFetchSmooth] HTML pre-fetched via extension: '+body.urls.length+' urls');
        } else {
          var failed = fetched.filter(function(f){ return !f || !f.ok; }).length;
          if (failed > 0) console.log('[anlFetchSmooth] extension fetch parziale ('+(body.urls.length-failed)+'/'+body.urls.length+' ok), fallback misto');
          // Passa solo gli HTML validi: per gli URL dove extension ha
          // fallito, l'edge function farà il suo fetch normale.
          var partial = fetched.map(function(f){ return (f && f.ok && f.html && f.html.length > 500) ? f.html : null; });
          body = Object.assign({}, body, { provided_html: partial });
        }
      }
    } else if (typeof extFetch === 'function'){
      extReady = await extFetch.isReady().catch(function(){ return false; });
    }
  } catch (e){
    console.warn('[anlFetchSmooth] extension fetch error:', e && e.message);
  }
  // Segnala al server che il client può fare round 2 (URL derivati via Hunter)
  if (extReady) body = Object.assign({}, body, { ext: true });

  var sessionToken=window._rbSession&&window._rbSession.access_token;
  var firstToken=sessionToken||SUPA_KEY;
  async function doCall(callBody, bearer){
    return fetch(SUPA_URL+'/functions/v1/smooth-endpoint',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+bearer},
      body:JSON.stringify(callBody)
    });
  }
  async function callWithAuth(callBody){
    var res=await doCall(callBody, firstToken);
    if(res.status===401 && sessionToken && firstToken!==SUPA_KEY){
      res=await doCall(callBody, SUPA_KEY);
    }
    if(!res.ok){
      var detail='';
      try{ var t=await res.text(); detail=t?(' — '+t.substring(0,120)):''; }catch(e){}
      throw new Error('HTTP '+res.status+detail);
    }
    return await res.json();
  }

  var data = await callWithAuth(body);

  // ─── ROUND 2: il server ha risolto URL derivati che non riesce a fetchare ──
  if (data && data.retry_with_ext && Array.isArray(data.need_fetch) && data.need_fetch.length && extReady && typeof extFetch === 'function'){
    try{
      console.log('[anlFetchSmooth] round 2 ext: il server chiede '+data.need_fetch.length+' URL derivati via Hunter');
      var extra = {};
      var got = 0;
      var fetched2 = await Promise.all(data.need_fetch.slice(0,4).map(function(u){
        return extFetch(u).catch(function(){ return null; });
      }));
      data.need_fetch.slice(0,4).forEach(function(u, i){
        var f = fetched2[i];
        if (f && f.ok && f.html && f.html.length > 500){ extra[u] = f.html; got++; }
      });
      if (got > 0){
        // ext:false → il server non può chiedere un terzo round: usa quello
        // che ha (extra_html + cache) e risponde definitivamente.
        var body2 = Object.assign({}, body, { ext:false, extra_html: extra });
        data = await callWithAuth(body2);
        if (data) data._ext_round2 = true;
      }
    }catch(e){
      console.warn('[anlFetchSmooth] round 2 ext fallito:', e && e.message);
    }
  }

  // Round 2 richiesto ma non eseguito/fallito → normalizza in errore esplicito
  if (data && data.retry_with_ext && !data._ext_round2 && !data.prices && !data.listings){
    data.error = data.error || 'pagina derivata bloccata lato server e fetch estensione non riuscito';
  }

  // Provenienza dei dati — usata dai badge UI delle sorgenti
  if (data && typeof data === 'object'){
    data._rb_via = data._ext_round2 ? 'hunter2'
                 : (body.provided_html ? 'hunter' : 'server');
  }
  return data;
}

// Console helper: diagnostica automatica PC su carte campione
// Uso: await anlDiag()                              → carte default
//      await anlDiag([{name:'...', card_name:'...'}])
window.anlDiag = async function(cards){
  console.log('⏳ Diagnostica in corso…');
  var body = cards ? {source:'diag', cards:cards} : {source:'diag'};
  var diag = await anlFetchSmooth(body);
  if(diag.error){ console.error('❌', diag.error); return diag; }
  console.log('%c📊 Diagnostica smooth-endpoint · '+diag.generated_at, 'font-weight:bold;font-size:13px');
  diag.cards.forEach(function(c){
    console.group('▸ '+c.card+(c.card_name?' ('+c.card_name+')':''));
    if(c.error){ console.warn('❌', c.error); console.groupEnd(); return; }
    console.log('title:', c.product_title);
    console.log('url:  ', c.product_url);
    if(c.ids && Object.keys(c.ids).length){
      console.group('ID HTML → prezzo + contesto');
      var idTable = {};
      Object.keys(c.ids).forEach(function(id){
        idTable[id] = { price: c.ids[id].price, context: (c.ids[id].label_context||'').substring(0,60) };
      });
      console.table(idTable);
      console.groupEnd();
    }
    if(c.labels && Object.keys(c.labels).length){
      console.group('Label-based');
      console.table(c.labels);
      console.groupEnd();
    }
    if(c.extracted){
      console.group('Prezzi finali');
      console.table(c.extracted);
      console.groupEnd();
    }
    if(c.anomalies && c.anomalies.length){
      console.warn('⚠ ANOMALIE:', c.anomalies);
    }
    console.groupEnd();
  });
  return diag;
};

async function anlStartLiveFetches(card){
  if(!card||!card.id) return;

  // Cache per card.id + mode + condizione/house+grado (per evitare refetch inutili)
  var sig = anlSigFor(card);
  if(anlLiveData._sig === sig){
    // già caricato: nessuna fetch rigira → ripristina i pallini dallo stato
    // cached e ridisegna (altrimenti gli spinner dello scaffold girano a vuoto)
    anlLiveData._loading = false;
    anlPendingFetches = 0;
    anlRestoreDotsFromCache();
    anlRenderToday();
    anlRenderProjection();
    try{ anlRenderPop(); }catch(e){}
    return;
  }
  anlLiveData = { _sig: sig };
  anlLiveData._loading = true;
  // 4 fetch parallele in volo (eBay sold, eBay active, PriceCharting, Cardmarket)
  anlPendingFetches = 4;

  // Imposta CM subito (già nella card object)
  var p = card.cardmarket && card.cardmarket.prices;
  if(p){
    var nm = p.trendPrice || p.avg30 || null;
    if(nm){
      // Per raw applica condition factor
      if(anlMode==='raw'){
        var cf = ANL_COND_FACTOR[document.getElementById('anlCond').value]||1.0;
        var ef = document.getElementById('anl1st').value==='yes' ? ANL_FIRST_ED_MULT : 1.0;
        anlLiveData.cm = Math.round(nm*cf*ef*100)/100;
      } else {
        anlLiveData.cm = null; // CM per gradate non è affidabile
      }
    }
  }
  anlLiveData.usdEur = await anlGetUsdEur();

  // Avvia in parallelo
  var setNm = card.set?card.set.name:'';
  var graded = anlMode==='graded';

  // eBay — cascata multi-query in MERGE mode (combina e dedup tutti i risultati)
  (async function(){
    var user = window._anlUserInput || {};
    var houseLabel = graded ? ANL_HOUSES[document.getElementById('anlHouse').value].label : '';
    var scoreVal   = graded ? document.getElementById('anlGradeScore').value : '';

    var nameUser = user.name || card.name;
    var nameApi  = card.name;
    var num      = card.number || user.number || '';
    // Variante "nome semplificato": rimuove suffix come -EX, -GX, -V, -VMAX, -VSTAR
    // (es. "Groudon-EX" → "Groudon"). Spesso i venditori non includono il suffisso.
    var nameSimple = nameUser ? nameUser.replace(/[-\s]?(EX|GX|V|VMAX|VSTAR|VUNION|TAG TEAM|BREAK|LEGEND)$/i,'').trim() : '';
    if(nameSimple && nameSimple!==nameUser && nameSimple.length<3) nameSimple = ''; // troppo corto, scarta

    // Varianti di scrittura del grade (molti venditori usano forme diverse)
    var gradeVariants = graded
      ? [' '+houseLabel+' '+scoreVal, ' '+houseLabel+'-'+scoreVal, ' '+houseLabel+scoreVal]
      : [''];
    var gradeSfx = gradeVariants[0];

    var queries = [];
    function addQ(s){ s=s.trim().replace(/\s+/g,' '); if(s && queries.indexOf(s)<0) queries.push(s); }

    // ─── Query SEMPLICI prima (più match) → SPECIFICHE dopo (filtri fini) ───
    // User report: "Tropical Wind PSA 9" trova 16 risultati,
    //              "Tropical Wind 26 Nintendo Black Star Promos PSA 9 pokemon" trova 0.
    // eBay già filtra _sacat=2611 (Pokemon) → "pokemon" parola spesso ridondante.
    // Query lunghe con set name penalizzano il fuzzy matching di eBay.
    // Edge function early-exit a 15 items: le prime query semplici dominano il sample.

    if(graded){
      // GRADED: priorità a query CON numero (carta singola identificabile).
      // CASCATA RIDOTTA per ottimizzare consumo crediti proxy (residential
      // 25 crediti × N query). Con cache TTL 12h le 3 query sono cachate
      // separatamente: prima esecuzione 75 crediti, ricerche successive 0.
      // 1. Nome + numero + voto (la più discriminante, copre 80% dei casi)
      if(nameUser && num)          addQ(nameUser+' '+num+gradeSfx);
      // 2. Nome semplificato + numero + voto (per "Groudon-EX" → "Groudon")
      if(nameSimple && num && nameSimple!==nameUser) addQ(nameSimple+' '+num+gradeSfx);
      // 3. Solo nome + voto (carta unica nel database o numero ambiguo)
      if(nameUser && !num)         addQ(nameUser+gradeSfx);
      // 4. Last resort: nome + voto senza numero (per varianti dove eBay
      //    indicizza male il numero nel titolo)
      else if(nameUser)            addQ(nameUser+gradeSfx);
    } else {
      // RAW: priorità nome+numero (carta singola identificabile da numero)
      if(nameUser && num)          addQ(nameUser+' '+num);
      if(nameSimple && num && nameSimple!==nameUser) addQ(nameSimple+' '+num);
      if(nameUser && num)          addQ(nameUser+' '+num+' pokemon');
      if(nameUser)                 addQ(nameUser);
      if(nameApi && nameApi!==nameUser && num) addQ(nameApi+' '+num);
      if(nameUser && num && setNm) addQ(nameUser+' '+num+' '+setNm);
    }

    // URL su eBay IT (EUR) — valuta primaria
    var urls = queries.map(function(q){
      // _sop=13 = "Recently sold" — stessa ordinamento del link "apri →" così
      // la fetch backend vede esattamente la stessa pagina del browser utente.
      return 'https://www.ebay.it/sch/i.html?_nkw='+encodeURIComponent(q)+'&LH_Sold=1&LH_Complete=1&_sacat=2611&_sop=13&_ipg=240';
    });

    // Fallback eBay.de: query semplice. SOLO in modalità raw, dove .de offre
    // venduti ulteriori spesso non presenti su .it. Per graded il pubblico
    // .de cerca con grade → trova listings cross-locale anche su .it.
    // Skip in graded per non duplicare costi proxy residenziale (25 crediti).
    if(nameUser && !graded){
      var deQ = nameUser+(num?' '+num:'');
      urls.push('https://www.ebay.de/sch/i.html?_nkw='+encodeURIComponent(deQ)+'&LH_Sold=1&LH_Complete=1&_sacat=2611&_sop=13&_ipg=240');
    }
    // eBay.com: rimosso. Quando i listings sono in EUR su .it/.de bastano.
    // Aggiungere .com USD richiederebbe conversione e il bot detection è
    // più severo (extra crediti per pochi venduti utili).

    // ─── DIAGNOSTICA: log queries effettivamente inviate ──
    // User feedback: assicurarsi che la cascata non finisca con queries lunghe
    // anche se UI link "apri →" mostra solo la prima.
    try{
      console.group('%c[Analizza] eBay sold cascade — '+queries.length+' queries + '+(urls.length-queries.length)+' fallbacks','color:#06b6d4;font-weight:bold');
      console.log('Mode:', graded?'GRADED ('+houseLabel+' '+scoreVal+')':'RAW');
      queries.forEach(function(q,i){ console.log((i+1)+'. ebay.it', q); });
      urls.slice(queries.length).forEach(function(u,i){
        var h = new URL(u).host;
        var nkw = decodeURIComponent((u.match(/_nkw=([^&]+)/)||[])[1]||'');
        console.log((queries.length+i+1)+'. '+h, nkw);
      });
      console.groupEnd();
    }catch(e){}

    try{
      // MERGE MODE: combina tutti gli URL, dedup per (titleNormalized, price, currency).
      // Restituisce items[] con titoli — usati dal client per filtri raw/graded e lingua.
      var data=await anlFetchSmooth({source:'ebay_sold', urls:urls, url:urls[0], min_hits:3, merge:true});
      var ebVia = anlViaFromData(data); if(ebVia) anlSetVia('anlSrcEbVia', ebVia.label, ebVia.cls);
      if(data.error && (!data.items || !data.items.length)){ anlPopEbay(data,data.error,card); return; }
      anlPopEbay(data, null, card);
    }catch(e){ anlPopEbay(null,e.message||'errore rete', card); }
  })().finally(function(){ anlEndFetch(sig); });

  // eBay LIVE ASKS — inserzioni attive (non venduti) per stesso target
  // Indicatore "interesse di mercato": prezzo richiesto vs prezzo realmente
  // pagato (sold). Spread elevato → carta poco liquida o prezzata troppo alta.
  (async function(){
    var user = window._anlUserInput || {};
    var houseLabel = graded ? ANL_HOUSES[document.getElementById('anlHouse').value].label : '';
    var scoreVal   = graded ? document.getElementById('anlGradeScore').value : '';
    var nameUser = user.name || card.name;
    var num      = card.number || user.number || '';
    var nameSimple = nameUser ? nameUser.replace(/[-\s]?(EX|GX|V|VMAX|VSTAR|VUNION|TAG TEAM|BREAK|LEGEND)$/i,'').trim() : '';
    if(nameSimple && nameSimple.length<3) nameSimple = '';
    var gradeSfx = graded ? ' '+houseLabel+' '+scoreVal : '';

    // Stesso pattern del cascata sold: SEMPLICE prima, SPECIFICO dopo
    var queries = [];
    function addQ(s){ s=s.trim().replace(/\s+/g,' '); if(s && queries.indexOf(s)<0) queries.push(s); }
    if(graded){
      if(nameUser)                 addQ(nameUser+gradeSfx);
      if(nameSimple && nameSimple!==nameUser) addQ(nameSimple+gradeSfx);
      if(nameUser && num)          addQ(nameUser+' '+num+gradeSfx);
      if(nameUser)                 addQ(nameUser+gradeSfx+' pokemon');
      if(nameUser && num)          addQ(nameUser+' '+num+gradeSfx+' pokemon');
      if(nameUser && num && setNm) addQ(nameUser+' '+num+' '+setNm+gradeSfx);
    } else {
      if(nameUser && num)          addQ(nameUser+' '+num);
      if(nameSimple && num && nameSimple!==nameUser) addQ(nameSimple+' '+num);
      if(nameUser)                 addQ(nameUser);
      if(nameUser && num)          addQ(nameUser+' '+num+' pokemon');
    }

    var urls = queries.map(function(q){
      return 'https://www.ebay.it/sch/i.html?_nkw='+encodeURIComponent(q)+'&_sacat=2611&_ipg=240';
    });
    if(nameUser && num){
      urls.push('https://www.ebay.de/sch/i.html?_nkw='+encodeURIComponent(nameUser+' '+num+gradeSfx+' pokemon')+'&_sacat=2611&_ipg=240');
      urls.push('https://www.ebay.com/sch/i.html?_nkw='+encodeURIComponent(nameUser+' '+num+gradeSfx+' pokemon')+'&_sacat=2611&_ipg=240');
    }

    try{
      var data = await anlFetchSmooth({source:'ebay_active', urls:urls, url:urls[0], min_hits:3, merge:true});
      anlPopEbayActive(data);
    }catch(e){ anlPopEbayActive(null, e.message||'errore rete'); }
  })().finally(function(){ anlEndFetch(sig); });

  // PriceCharting — cascata multi-query
  (async function(){
    var user = window._anlUserInput || {};
    var nameUser = user.name || card.name;
    var nameApi  = card.name;
    var num      = card.number || '';

    var queries=[];
    function addQ(s){ s=s.trim().replace(/\s+/g,' '); if(s && queries.indexOf(s)<0) queries.push(s); }
    if(nameUser && setNm) addQ(nameUser+' '+setNm);
    if(nameApi && setNm && nameApi!==nameUser) addQ(nameApi+' '+setNm);
    if(nameUser && num)   addQ(nameUser+' '+num);
    if(nameUser)          addQ(nameUser);

    var urls = queries.map(function(q){
      return 'https://www.pricecharting.com/search-products?q='+encodeURIComponent(q)+'&type=prices';
    });
    var cardNameFull = nameUser + (num ? ' '+num : '');
    var pcFirstEdition = (anlMode==='raw' && document.getElementById('anl1st').value==='yes');

    try{
      var data=await anlFetchSmooth({source:'pricecharting', urls:urls, url:urls[0], card_name:cardNameFull, first_edition:pcFirstEdition});
      var pcVia = anlViaFromData(data); if(pcVia) anlSetVia('anlSrcPcVia', pcVia.label, pcVia.cls);
      if(data.error){ anlPopPc(null,data.error); return; }
      anlLiveData.pc=data.prices;
      anlLiveData.pcProductUrl=data.url||null;
      anlLiveData.pcProductTitle=(data.prices&&data.prices.productTitle)||null;

      // Diagnostica: log dei sold listings per grade (sample size) + se il
      // merge da /recent-sales ha avuto effetto.
      try{
        console.group('%c[Analizza] PC sold listings per grade','color:#10b981;font-weight:bold');
        if(data._recent_sales_merged){
          console.log('✓ /recent-sales merged ('+data._recent_sales_hits+' total hits)');
          console.log('  URL:', data._recent_sales_url);
        } else {
          console.warn('✗ /recent-sales non disponibile o vuoto');
        }
        var gfl = data.prices && data.prices.grades_from_listings;
        if(gfl){
          var rows = Object.keys(gfl).map(function(k){
            return {
              key: k,
              count: gfl[k].count || 0,
              median: gfl[k].median,
              currency: gfl[k].currency_symbol,
              min: gfl[k].min,
              max: gfl[k].max,
            };
          }).sort(function(a,b){ return b.count - a.count; });
          console.table(rows);
        } else {
          console.warn('Nessun grades_from_listings — solo aggregati API');
        }
        console.groupEnd();
      }catch(e){}

      anlPopPc(data.prices);
    }catch(e){ anlPopPc(null,e.message||'errore rete'); }
  })().finally(function(){ anlEndFetch(sig); });

  // Cardmarket — DELEGA alla cascata canonica del parent (fetchCmPriceLive):
  // L0 memoria URL → L0-DB rb_card_index (URL verificati cross-device) →
  // fast-path CMAPI → scrape ext-first (Hunter) con retry su blocco →
  // cascata varianti V1/V2 → L2 search → L3 discovery auto-riparante.
  // È la STESSA pipeline delle ricerche in inserimento preventivi: i dati
  // estratti qui e lì sono identici per costruzione (parsing in un solo posto).
  // Il vecchio percorso (singolo fetch su URL indovinato da buildCMDirectUrl,
  // zero retry, zero indice) resta solo come fallback se il bridge manca.
  (async function(){
    try{
      var cond = document.getElementById('anlCond').value;
      var lang = document.getElementById('anlLang').value;
      var is1st= document.getElementById('anl1st').value==='yes';
      var setId= card.set?card.set.id:null;

      var fnLive   = rbParentFn('fetchCmPriceLive');
      var fnAction = rbParentFn('rbCmUserAction');
      var fnAuth   = rbParentFn('cmAuthoritativeUrl');

      if(typeof fnLive === 'function'){
        // Estensione pronta? Con Hunter vogliamo i LISTING REALI (servono per
        // parsare i grading nei commenti e per il ladder condizioni), quindi
        // extLadder:true salta la fast-lane CMAPI. Senza Hunter, in raw mode,
        // CMAPI è l'unica fonte non bloccata da Cloudflare: la lasciamo attiva.
        var extOk = false;
        try{
          var extFn = (window.parent && window.parent.rbExtFetch) || window.rbExtFetch;
          if(typeof extFn === 'function') extOk = await extFn.isReady().catch(function(){ return false; });
        }catch(e){}

        var optsLive = {
          name: card.name, setId: setId, number: card.number || '',
          // Graded → 'NM' (minCondition=2): CM include sia gli slab catalogati
          // Mint sia quelli NM (es. PSA10 listati in entrambe le condizioni).
          // Raw → la condizione scelta dall'utente, senza floor aggiunti.
          condition: graded ? 'NM' : cond,
          language: lang, variant: 'Normal', first_edition: is1st,
          setName: setNm, rarity: card.rarity || '',
          cmUrl: (typeof fnAuth === 'function' ? fnAuth(card) : null) || null,
          extLadder: (extOk || graded),
          silent: true   // mai aprire tab userscript da Analizza
        };
        var run = function(){ return fnLive(optsLive); };
        // rbCmUserAction: il click "Analizza" è un'azione esplicita → sblocca
        // la policy RB_CM_SCRAPE_ON_CLICK_ONLY nel parent per questa chiamata.
        var r = await (typeof fnAction === 'function' ? fnAction(run) : run());
        try{
          console.group('%c[Analizza] CM cascata canonica — '+((r&&r.attempts)||[]).length+' tentativi','color:#c9a84c;font-weight:bold');
          ((r&&r.attempts)||[]).forEach(function(a,i){
            console.log((i+1)+'. '+a.kind+' → '+(a.count||0)+' listing '+(a.error?('('+a.error+')'):'')+' '+(a.url||''));
          });
          console.groupEnd();
        }catch(e){}
        anlPopCmLive(r, card);
      } else {
        // Fallback legacy (bridge parent assente): vecchio percorso diretto
        var cmUrl = (rbParentFn("buildCMDirectUrl")||function(){return"#"})(card.name, setId, card.number, cond, lang, 'Normal', is1st, setNm, card.rarity||'');
        var fetchUrl = cmUrl;
        if(graded && fetchUrl && fetchUrl.indexOf('minCondition=') >= 0){
          fetchUrl = fetchUrl.replace(/([?&]minCondition=)\d+/, '$11');
        }
        var data = await anlFetchSmooth({source:'cardmarket', url:fetchUrl, urls:[fetchUrl], debug:true});
        anlPopCm(data, card);
      }
    }catch(e){ anlPopCm({error:e.message||'errore rete'}, card); }
  })().finally(function(){ anlEndFetch(sig); });

  // Render CM già disponibile e sezioni (mostra subito le rotelline di attesa)
  anlRenderToday();
  anlRenderProjection();
}

function anlSigFor(card){
  return [
    card.id, anlMode,
    document.getElementById('anlLang').value,
    anlMode==='raw' ? document.getElementById('anlCond').value : '',
    anlMode==='raw' ? document.getElementById('anl1st').value : '',
    anlMode==='graded' ? document.getElementById('anlHouse').value : '',
    anlMode==='graded' ? document.getElementById('anlGradeScore').value : '',
  ].join('|');
}

// ─── HELPER condivise: parser grading + lingua su titoli/commenti ─────────────
// Riconosce indicatori di grading in un testo (titolo eBay o commento CM).
// Casi: "PSA 9", "PSA-9", "PSA9", "BGS 8.5", "BGS8.5", "CGC 10", "ACE MINT 9"
// Ritorna {house, score} oppure null.
function anlParseGrading(text){
  if(!text) return null;
  var s = String(text).replace(/\s+/g,' ').trim();
  // Coppie (house canonica, regex name) — applichiamo il pattern completo
  // direttamente, senza pre-test con \bHOUSE\b che fallisce su "BGS8" perché
  // tra S e 8 non c'è word boundary (entrambi word char).
  var houses = [
    ['PSA','PSA'],
    ['BGS','(?:BGS|Beckett)'],
    ['CGC','CGC'],
    ['SGC','SGC'],
    ['HGA','HGA'],
    ['GMA','GMA'],
    ['TAG','TAG'],
    ['ARS','ARS'],
    ['GG','(?:GG|GetGraded)'],
    ['ACE','ACE']
  ];
  for(var i=0;i<houses.length;i++){
    var house = houses[i][0], houseStr = houses[i][1];
    var rx = new RegExp(
      '\\b'+houseStr+
      '(?:\\s*[A-Za-z]{0,8})?'+
      '\\s*[-:.\\s]?\\s*'+
      '(10(?:\\.0)?|[1-9](?:\\.5)?)\\b',
      'i'
    );
    var m = s.match(rx);
    if(m){
      var score = parseFloat(m[1]);
      if(score>=1 && score<=10) return { house:house, score:score };
    }
  }
  return null;
}

// Rileva la lingua dichiarata nel titolo eBay/CM. Marker espliciti hanno
// priorità; assenza di marker = sconosciuto (NON assumiamo "EN by default").
//
// Riconosce:
//  - Marker espliciti: "italian", "italiano", "ITA", "JPN", "ENG", etc.
//  - Set italiani nativi: "esploratori oscuri", "bianco e nero",
//    "esploratori delle tenebre" (BW Italian), "diamante e perla", etc.
//    Anche carte SENZA la parola "italiano" sono ITA se hanno il nome
//    italiano del set. Esempio:
//      "Pokemon Groudon EX Esploratori Oscuri Full Art #106 PSA 8" → ITA
function anlDetectLang(text){
  if(!text) return null;
  var s = ' '+String(text).toLowerCase()+' ';

  // Pattern marker espliciti (priorità massima)
  if(/\b(italian|italiana|italiano|italiani|ita)\b/.test(s)) return 'ITA';
  if(/\b(japanese|giapponese|japones|jpn|jap)\b/.test(s)) return 'JPN';
  if(/\b(german|deutsch|tedesco|deu|ger)\b/.test(s)) return 'DEU';
  if(/\b(french|francese|francais|français|fra|fr)\b/.test(s)) return 'FRA';
  if(/\b(spanish|spagnolo|español|espanol|esp|spa)\b/.test(s)) return 'ESP';
  if(/\b(portuguese|portoghese|português|portugues|por)\b/.test(s)) return 'POR';
  if(/\b(korean|coreano|kor)\b/.test(s)) return 'KOR';
  if(/\b(chinese|cinese|chs|cht)\b/.test(s)) return 'CHI';
  if(/\b(english|inglese|eng)\b/.test(s)) return 'ENG';

  // Set / espressioni italiane native (nome del set in italiano = ITA)
  // Lista incrementale: aggiungere set quando emergono.
  var italianSetTerms = [
    'esploratori oscuri',          // Dark Explorers (xy era → BW)
    'esploratori delle tenebre',   // varianti
    'bianco e nero',               // Black & White (BW)
    'bianco & nero',
    'diamante e perla',            // Diamond & Pearl
    'gioielli di lotta',           // Battle Styles
    'astri lucenti',               // Brilliant Stars
    'origini perdute',             // Lost Origin
    'destini splendenti',          // Shining Fates
    'destini incrociati',          // Cosmic Eclipse
    'spada e scudo',               // Sword & Shield
    'scarlatto e violetto',        // Scarlet & Violet
    'forze temporali',             // Temporal Forces
    'maschera del crepuscolo',     // Twilight Masquerade
    'antiche origini',             // Ancient Origins
    'fuoco e ghiaccio',            // Fire & Ice
    'leggende celesti',            // Celestial Storm
    'nebbia glaciale',             // ?
    'tenebre incandescenti',       // Burning Shadows
    'invasione scarlatta',         // Crimson Invasion
    'maestri della furia',         // ?
    'echi del passato',            // ?
    'rivali predestinati',         // ?
    'fiamma ossidiana',            // Obsidian Flames
    'evoluzioni a paldea',         // Paldea Evolved
  ];
  for(var i=0; i<italianSetTerms.length; i++){
    if(s.indexOf(italianSetTerms[i]) !== -1) return 'ITA';
  }

  return null; // unknown — non azzardiamo
}

// ─── HELPER: normalizza prezzi eBay usando CM come ancora di plausibilità ─
// Converte tutto in EUR, filtra via banda [lo, hi] ancorata al CM trend (se disponibile),
// poi applica una seconda passata MAD per gli outlier statistici residui.
// Se data.items è presente, applica anche filtri raw/graded basati sul titolo
// e calcola statistiche di lingua per warning di mismatch.
function anlSanitizeEbay(data, cmRefEur, rate, graded, userLang){
  if(!data || !data.prices || !data.prices.length) return data;

  // ── PRE-FILTER per items con titolo (se disponibili) ──
  // Quando abbiamo i titoli (data.items) possiamo:
  //   • In graded mode: tenere SOLO items con grading nel titolo (esclude raw)
  //   • In raw mode:    escludere items con grading nel titolo (esclude graded)
  //   • Rilevare lingua e segnalare mismatch
  var langStats = { ITA:0, ENG:0, JPN:0, DEU:0, FRA:0, ESP:0, POR:0, KOR:0, CHI:0, unknown:0 };
  var rawCount = 0, gradedCount = 0;
  var filteredItems = null;

  if(data.items && data.items.length){
    var keptItems = [];
    var droppedByMode = 0;
    data.items.forEach(function(it){
      var g = anlParseGrading(it.title);
      if(g) gradedCount++; else rawCount++;
      var lang = anlDetectLang(it.title);
      langStats[lang || 'unknown']++;

      // Filtro per modalità
      if(graded){
        // Tieni solo items con grading nel titolo (qualsiasi casa+grado purché presente).
        // Filtro più stretto sul match esatto avverrà nel sanitize a valle.
        if(g) keptItems.push(Object.assign({}, it, {_grading:g, _lang:lang}));
        else droppedByMode++;
      } else {
        if(!g) keptItems.push(Object.assign({}, it, {_grading:null, _lang:lang}));
        else droppedByMode++;
      }
    });

    // Se il filtro modalità lascia troppo poco (<3) e abbiamo abbastanza dati totali (>=6),
    // disattiva il filtro e ritorna a tutti gli items con un warning.
    if(keptItems.length < 3 && data.items.length >= 6){
      // Manteniamo tutti gli items ma marchiamo come "filtro modalità inefficace"
      filteredItems = data.items.map(function(it){
        return Object.assign({}, it, {_grading:anlParseGrading(it.title), _lang:anlDetectLang(it.title)});
      });
      data._modeFilterAborted = true;
    } else {
      filteredItems = keptItems;
      data._modeFilterDropped = droppedByMode;
    }
  }

  // ── Normalizzazione prezzi in EUR ──
  // Se abbiamo filteredItems usa quelli; altrimenti usa data.prices (legacy)
  var inEur;
  if(filteredItems){
    inEur = filteredItems.map(function(it){
      var c = it.currency || data.currency || 'EUR';
      if(c==='USD') return it.price * rate;
      if(c==='GBP') return it.price * 1.17 * rate;
      return it.price;
    });
  } else {
    inEur = data.prices.map(function(p){
      if(data.currency==='USD')      return p * rate;
      if(data.currency==='GBP')      return p * 1.17 * rate;
      return p;
    });
  }

  if(inEur.length === 0){
    // Nessun item dopo il filtro modalità: ritorna struttura "vuota dopo filtro"
    return Object.assign({}, data, {
      pricesEur: [], medianEur: null, avgEur: null, minEur: null, maxEur: null,
      countEur: 0, filteredOut: data.prices.length, cmAnchor: null,
      confidenceLevel: 'none',
      langStats: langStats, rawCount: rawCount, gradedCount: gradedCount,
    });
  }

  // ── Filtro CM-anchored ──
  var lo=null, hi=null, anchored=false;
  if(cmRefEur && cmRefEur>0){
    if(graded){ lo = cmRefEur * 0.5;  hi = cmRefEur * 80; }
    else       { lo = cmRefEur * 0.3;  hi = cmRefEur * 4;  }
    anchored = true;
  }

  var plausible = anchored ? inEur.filter(function(p){return p>=lo && p<=hi;}) : inEur.slice();
  if(anchored && (plausible.length < 3 || plausible.length < inEur.length*0.4)){
    plausible = inEur.slice();
    anchored = false;
  }

  // ── MAD filter ──
  plausible.sort(function(a,b){return a-b;});
  var mid = Math.floor(plausible.length/2);
  var med = plausible.length%2===0 ? (plausible[mid-1]+plausible[mid])/2 : plausible[mid];
  var absDevs = plausible.map(function(p){return Math.abs(p-med);}).sort(function(a,b){return a-b;});
  var mad = absDevs[Math.floor(absDevs.length/2)] || med*0.1;
  var finalSet;
  if(plausible.length >= 5 && mad > 0){
    finalSet = plausible.filter(function(p){return Math.abs(p-med) <= 4*mad;});
    if(finalSet.length < 3) finalSet = plausible;
  } else {
    finalSet = plausible;
  }

  finalSet.sort(function(a,b){return a-b;});
  var n = finalSet.length;
  var mid2 = Math.floor(n/2);
  var median = n%2===0 ? (finalSet[mid2-1]+finalSet[mid2])/2 : finalSet[mid2];
  var sum = finalSet.reduce(function(a,b){return a+b;},0);
  var avg = sum/n;

  var conf = n>=10 ? 'high' : (n>=5 ? 'medium' : (n>=3 ? 'low' : 'very-low'));

  return Object.assign({}, data, {
    pricesEur: finalSet,
    medianEur: median,
    avgEur: avg,
    minEur: finalSet[0],
    maxEur: finalSet[n-1],
    countEur: n,
    filteredOut: data.prices.length - n,
    cmAnchor: anchored ? cmRefEur : null,
    confidenceLevel: conf,
    langStats: langStats,
    rawCount: rawCount,
    gradedCount: gradedCount,
  });
}

// Badge provenienza dati sorgente: HUNTER (ext, IP residenziale), HUNTER×2

// (userscript), SERVER (fetch datacenter), TREND (fallback TCG API).

  el.textContent = label || '';
  el.className = 'anl-src-via'+(cls?' '+cls:'');

    'LIVE':     'listing reali dalla pagina Cardmarket',

// Mappa il marker _rb_via di anlFetchSmooth in label badge
function anlViaFromData(data){

// Ripristina i pallini di confidenza dei tre box dallo stato già in cache.
// Usato quando si riapre una carta con sig identica: le fetch non rigirano,
