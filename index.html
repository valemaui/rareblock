<!-- ═══════════════════════════════════════════════════════════════════════
     RareBlock · index.html (landing pubblica del dominio)
     ─────────────────────────────────────────────────────────────────────
     Questa pagina è la prima cosa che vede un visitatore non autenticato
     che apre www.rareblock.eu. Funge da:

       1. VETRINA — logo + tagline + 2 CTA (Accedi / Richiedi accesso).
          Estetica luxury editoriale, coerente con #authOverlay (vedi
          pokemon-db.html righe 1180-1916), che era de facto la
          "landing storica" del progetto integrata nel modulo login.

       2. FRAGMENT-HANDLER (safety net Supabase Auth) — quando un utente
          clicca un link email Supabase (signup confirm, magic link,
          recovery, invite, email change) il provider può atterrarlo
          sulla root del dominio invece che sulla pagina applicativa,
          a causa di Site URL / Redirect URLs mal configurati o cache
          email vecchie. In quel caso l'URL contiene un fragment del
          tipo:
              #access_token=...&type=signup|magiclink|recovery|invite
              #error=access_denied&error_code=otp_expired
          oppure un query param tipo:
              ?recovery=1
          Il blocco JS di sotto rileva questi pattern e re-instrada il
          browser preservando hash + query, in modo che la sessione non
          si perda. La destinazione è pokemon-db.html dove vive
          rbHandleRecoveryCallback (sarà spostata in rareblock-login.html
          alla Tappa 2 di questo refactor; per ora puntiamo lì per
          continuità con il comportamento esistente).

     PRINCIPI DI DESIGN
       • Single-file (no CSS/JS esterni eccetto Google Fonts)
       • Stesso linguaggio visivo di #authOverlay: noise SVG + glow gold
         radiale, palette #0c0c0b/#c9a84c/#f0ead8, font Fraunces
         (italic, serif editoriale) + Figtree (sans body) + Montserrat
         (wordmark)
       • Nessuna animazione "marketing" (no parallax, no pop-up): è una
         soglia silenziosa, non un funnel
       • Mobile-first responsive: il logo + tagline + CTA scendono in
         colonna sotto i 480px
     ═══════════════════════════════════════════════════════════════════════ -->

<style>

  pointer-events:none;
  z-index:0;
  opacity:.4;

<!-- ───────────────────────────────────────────────────────────────────────
     FRAGMENT HANDLER (Supabase Auth safety net)
     ─────────────────────────────────────────────────────────────────────
     Questo blocco gira PRIMA del rendering del body. Se l'URL contiene
     un fragment Supabase Auth (utente che torna da link email) o il
     query param ?recovery=1, redireziona immediatamente alla pagina
     applicativa preservando tutti i parametri. Altrimenti non fa nulla
     e lascia caricare la landing normalmente.

     Pattern riconosciuti nel hash:
       access_token=          (sessione concessa: signup confirm, magic,
                              invite, email_change confirm, OAuth)
       refresh_token=         (idem, accompagna access_token)
       error=                 (link scaduto / invalidato / OTP expired)
       error_code=
       provider_token=        (callback OAuth Google)
       type=                  (qualifica il tipo: signup/recovery/...)

     Pattern riconosciuti nella query string:
       recovery=1             (legacy: alcuni vecchi link puntano qui)

     Destinazione: /pokemon-db.html (dove rbHandleRecoveryCallback è
     attualmente definita). Sarà spostata su /rareblock-login.html alla
     Tappa 2 del refactor — al momento del cambio basterà cambiare la
     stringa 'AUTH_TARGET' qui sotto.
     ─────────────────────────────────────────────────────────────────── -->
<script>
(function(){
  try{
    var AUTH_TARGET = '/pokemon-db.html';
    var h = window.location.hash || '';
    var s = window.location.search || '';

    // Marker Supabase nel fragment
    var hasAuthHash = h && /(?:^|[#&])(access_token|refresh_token|error|error_code|provider_token|type)=/.test(h);
    // Marker legacy nella query
    var hasAuthQuery = s && /[?&]recovery=1\b/.test(s);

    if(hasAuthHash || hasAuthQuery){
      var target = AUTH_TARGET;
      if(s) target += s;
      if(h) target += h;
      // replace per non lasciare la root nella history (back funziona meglio)
      window.location.replace(target);
    }
    // Altrimenti: nessuna redirect, la landing si carica normalmente
  }catch(e){
    // Se qualcosa va storto nel parsing, fallback: lascia caricare la
    // landing. Meglio mostrare la landing che far girare l'utente in
    // tondo con redirect rotti.
  }
})();
</script>
